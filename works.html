<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CP同人档案馆 - 创作">
  <meta name="theme-color" content="#7BA7C4">
  
  <title>灵感存档 | CP同人档案馆</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- 主题样式 -->
  <link rel="stylesheet" href="styles/theme-lionmio.css">
  <link rel="stylesheet" href="styles/theme-lucasmia.css">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/works.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header glass" role="banner">
    <div class="header-container">
      <div class="header-logo">
        <div class="logo-badge site-name-toggle" title="点击切换站点主题" role="button" tabindex="0" aria-label="切换站点主题">
          <span class="logo-initials">LM</span>
        </div>
        <span class="logo-text site-name-toggle" title="点击切换站点主题">
          <span class="site-name">LionMio</span>
        </span>
      </div>

      <!-- 桌面端导航 -->
      <nav class="desktop-nav" role="navigation" aria-label="主导航">
        <a href="index.html" class="nav-link">首页</a>
        <a href="archive.html" class="nav-link">档案</a>
        <a href="timeline.html" class="nav-link">时间线</a>
        <a href="commission.html" class="nav-link">约稿</a>
        <a href="works.html" class="nav-link active">创作</a>
        <a href="guestbook.html" class="nav-link">留言板</a>
        <a href="suggestion.html" class="nav-link">建议箱</a>
        <a href="fortune.html" class="nav-link">运势</a>
      </nav>

      <!-- 手机端汉堡按钮 -->
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="菜单">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- 手机端全屏菜单 -->
      <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">首页</a>
        <a href="archive.html">档案</a>
        <a href="timeline.html">时间线</a>
        <a href="commission.html">约稿</a>
        <a href="works.html">创作</a>
        <a href="guestbook.html">留言板</a>
        <a href="suggestion.html">建议箱</a>
        <a href="fortune.html">运势</a>
      </div>

      <!-- 用户登录状态区域 -->
      <div class="header-auth-area" id="headerAuth"></div>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="main-content works-page">
    <div class="container">
      
      <!-- ========== 列表视图 ========== -->
      <div class="works-list-view" id="worksListView">
        
        <!-- 页面标题 -->
        <section class="page-header">
          <h1 class="page-title">灵感存档</h1>
          <p class="page-subtitle">每一份创作，都是羁绊的回响</p>
        </section>

        <!-- 工具栏 -->
        <div class="works-toolbar">
          <!-- 搜索框 -->
          <div class="search-container">
            <input type="text" class="search-input" id="worksSearch" placeholder="搜索作品标题、作者..." autocomplete="off">
            <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </div>

          <!-- 分类 Tab -->
          <nav class="works-tabs" role="tablist">
            <button class="tab-btn active" data-category="all" role="tab" aria-selected="true">全部</button>
            <button class="tab-btn" data-category="text" role="tab" aria-selected="false">文字</button>
            <button class="tab-btn" data-category="image" role="tab" aria-selected="false">图片</button>
            <button class="tab-btn" data-category="music" role="tab" aria-selected="false">音乐</button>
            <button class="tab-btn" data-category="video" role="tab" aria-selected="false">视频</button>
          </nav>

          <!-- 布局切换 -->
          <div class="layout-switch">
            <button class="layout-btn active" data-layout="masonry" title="瀑布流">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="10" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="17" width="7" height="4" rx="1"/>
              </svg>
            </button>
            <button class="layout-btn" data-layout="grid" title="网格">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- 作品网格（由 JS 动态生成） -->
        <div class="works-grid masonry" id="worksGrid">
        </div>
      </div>

      <!-- ========== 详情视图 ========== -->
      <div class="works-detail-view hidden" id="worksDetailView">
        <!-- 返回按钮 -->
        <button class="btn-back" id="btnBack">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          <span>← 返回列表</span>
        </button>

        <!-- 居中阅读卡片 -->
        <div class="article-body">
          <!-- 文章标题 -->
          <h1 class="article-title" id="detailTitle">作品标题</h1>

          <!-- 文章元信息 -->
          <div class="article-meta">
            <span class="detail-author" id="detailAuthor">作者：-</span>
            <span class="detail-tag" id="detailTag">分类</span>
            <span class="detail-date" id="detailDate">-</span>
          </div>

          <!-- 分隔线 -->
          <div class="article-divider"></div>

          <!-- 作品内容（封面图/视频等） -->
          <div class="detail-cover" id="detailCover">
            <div class="cover-placeholder detail-cover-placeholder" id="detailCoverPlaceholder">
              <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="M21 15l-5-5L5 21"/>
              </svg>
            </div>
            <!-- 相册容器（多图时显示） -->
            <div class="gallery-container" id="galleryContainer" style="display:none;">
              <div class="gallery-main">
                <img id="galleryMainImg" src="" alt="">
                <button class="gallery-prev" aria-label="上一张">‹</button>
                <button class="gallery-next" aria-label="下一张">›</button>
                <span class="gallery-counter" id="galleryCounter">1 / 1</span>
              </div>
              <div class="gallery-thumbs" id="galleryThumbs">
                <!-- 动态生成缩略图 -->
              </div>
            </div>
          </div>

          <!-- 正文内容 -->
          <div class="article-text" id="detailContent">
          </div>

          <!-- 收藏按钮 -->
          <div class="article-actions">
            <button class="btn-detail-favorite" id="btnDetailFavorite">
              <span class="favorite-icon-large">♡</span>
              <span class="favorite-text">收藏</span>
            </button>
          </div>
        </div>

        <!-- 评论区卡片 -->
        <div class="article-body">
          <h2 class="comments-title" id="commentsTitle">
            💬 留言 <span class="comments-count" id="commentsCount">(0)</span>
          </h2>

          <!-- 留言列表 -->
          <div class="comments-list" id="commentsList">
          </div>

          <!-- 发表评论 -->
          <div class="comment-form-section">
            <form class="comments-form" id="commentsForm">
              <div class="comments-form-row">
                <input type="text" class="comment-nickname input-field" placeholder="你的昵称" maxlength="20" required>
              </div>
              <textarea class="comment-content input-field" placeholder="说点什么..." maxlength="200" required></textarea>
              <button type="submit" class="btn btn-submit-comment">发布留言</button>
            </form>
          </div>
        </div>
      </div>

      <!-- ========== 文字阅读器弹窗 ========== -->
      <div class="text-reader-overlay" id="textReaderOverlay">
        <div class="text-reader-modal" id="textReaderModal">
          <div class="text-reader-header">
            <div class="text-reader-meta">
              <span class="text-reader-tag" id="readerTag"></span>
              <h2 class="text-reader-title" id="readerTitle"></h2>
              <p class="text-reader-author" id="readerAuthor"></p>
            </div>
            <button class="text-reader-close" id="readerClose" aria-label="关闭">✕</button>
          </div>
          <div class="text-reader-body">
            <div class="text-reader-content" id="readerContent"></div>
          </div>
          <div class="text-reader-footer">
            <button class="reader-action-btn" id="readerFavoriteBtn">
              <span class="reader-fav-icon">♡</span>
              <span>收藏</span>
            </button>
            <button class="reader-action-btn" id="readerCommentBtn">
              💬 留言
            </button>
          </div>
        </div>
      </div>

      <!-- 沉浸阅读悬浮按钮 -->
      <button class="immersive-float-btn" id="immersiveFloatBtn" aria-label="沉浸阅读" title="沉浸阅读">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span class="immersive-float-text">阅</span>
      </button>

      <!-- ========== 沉浸阅读模式 ========== -->
      <div class="immersive-overlay" id="immersiveOverlay" role="dialog" aria-modal="true" aria-label="沉浸阅读模式">
        <!-- 阅读进度条 -->
        <div class="immersive-progress" id="immersiveProgress"></div>

        <!-- 顶部工具栏 -->
        <div class="immersive-toolbar" id="immersiveToolbar">
          <!-- 左侧：退出按钮 -->
          <button class="immersive-btn immersive-btn-close" id="immersiveClose" aria-label="退出沉浸阅读">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>

          <div class="immersive-toolbar-center">
            <span class="immersive-title-preview" id="immersiveTitlePreview"></span>
          </div>

          <!-- 右侧：字号调节 + 背景切换 -->
          <div class="immersive-toolbar-right">
            <!-- 字号 -->
            <div class="immersive-font-size" role="group" aria-label="字号调节">
              <button class="immersive-size-btn" data-size="small" title="小字">A</button>
              <button class="immersive-size-btn active" data-size="medium" title="中字">A</button>
              <button class="immersive-size-btn" data-size="large" title="大字">A</button>
            </div>
            <!-- 背景色 -->
            <div class="immersive-bg-switch" role="group" aria-label="背景色">
              <button class="immersive-bg-btn active" data-bg="light" title="白色" aria-label="白色背景">白</button>
              <button class="immersive-bg-btn" data-bg="cream" title="米色" aria-label="米色背景">米</button>
              <button class="immersive-bg-btn" data-bg="dark" title="深色" aria-label="深色背景">暗</button>
            </div>
          </div>
        </div>

        <!-- 阅读内容区 -->
        <div class="immersive-content-wrap" id="immersiveContentWrap">
          <div class="immersive-content" id="immersiveContent">
            <div class="immersive-header">
              <span class="immersive-tag" id="immersiveTag"></span>
              <h1 class="immersive-title" id="immersiveTitle"></h1>
              <p class="immersive-author" id="immersiveAuthor"></p>
              <div class="immersive-divider"></div>
            </div>
            <div class="immersive-text" id="immersiveText"></div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- 回到顶部按钮 -->
  <button class="back-to-top" id="backToTop" aria-label="回到顶部">
    <span class="back-to-top-icon">↑</span>
  </button>

  <!-- Footer -->
  <footer class="site-footer" role="contentinfo">
    <div class="container">
    </div>
  </footer>

  <script src="js/music-player.js"></script>

</body>
