  <!-- 主内容 -->
  <main class="main-content guestbook-page">
    <div class="container">
      
      <!-- 页面标题 -->
      <section class="page-header">
        <h1 class="page-title">便签墙</h1>
        <p class="page-subtitle">留下你的足迹，让思念延续</p>
      </section>

      <!-- 留言输入区 -->
      <section class="message-input card">
        <h2 class="input-title">写下一句话</h2>
        <form id="messageForm">
          <div class="input-row">
            <div class="input-group">
              <label for="nickname" class="input-label">昵称</label>
              <input type="text" id="nickname" name="nickname" class="input-field" 
                     placeholder="你的名字" maxlength="20" required>
            </div>
          </div>
          <div class="input-group">
            <label for="message" class="input-label">留言</label>
            <textarea id="message" name="message" class="input-field textarea" 
                      placeholder="想说的话..." maxlength="100" required></textarea>
            <span class="char-count"><span id="charCurrent">0</span>/100</span>
          </div>
          <button type="submit" class="btn btn-submit">
            <span>留下印记</span>
          </button>
        </form>
      </section>

      <!-- 便签墙 -->
      <section class="notes-wall">
        <div class="notes-grid" id="notesGrid">
          <!-- 便签将由 JavaScript 生成 -->
        </div>
      </section>

    </div>
  </main>
