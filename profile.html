<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CP同人档案馆 - 个人主页">
  <meta name="theme-color" content="#7BA7C4">
  
  <title>个人主页 | CP同人档案馆</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- 主题样式 -->
  <link rel="stylesheet" href="styles/theme-lionmio.css">
  <link rel="stylesheet" href="styles/theme-lucasmia.css">
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .profile-page { min-height: 100vh; padding-bottom: 4rem; }
    
    /* 返回按钮 */
    .profile-back-btn {
      position: absolute;
      top: 1rem;
      left: 1rem;
      z-index: 100;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }
    .profile-back-btn:hover {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.8);
    }
    
    /* 顶部横幅 */
    .profile-banner { height: 200px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%); position: relative; }
    .profile-banner::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(to top, rgba(0,0,0,0.1), transparent); }
    
    /* 编辑资料按钮 */
    .profile-edit-banner-btn {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      z-index: 100;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .profile-edit-banner-btn:hover {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.8);
    }
    
    /* 头像区域 */
    .profile-avatar-section { position: relative; max-width: 1200px; margin: -50px auto 0; padding: 0 2rem; z-index: 10; }
    .profile-avatar-wrapper { display: inline-block; position: relative; }
    .profile-avatar { width: 120px; height: 120px; border-radius: 50%; background: var(--accent); border: 4px solid var(--bg-primary); box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; font-family: "Noto Serif SC", serif; font-size: 2.5rem; font-weight: 700; color: var(--btn-text); overflow: hidden; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-avatar-edit { position: absolute; bottom: 0; right: 0; width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: 3px solid var(--bg-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: opacity 0.3s; }
    .profile-avatar-wrapper:hover .profile-avatar-edit { opacity: 1; }
    .profile-avatar-edit svg { width: 16px; height: 16px; stroke: white; }
    
    /* 用户信息区域 */
    .profile-info-section { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem; }
    .profile-info-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
    .profile-username { font-size: 1.8rem; font-weight: 600; color: var(--text-title); margin-bottom: 0.3rem; }
    .profile-joined { font-size: 0.85rem; color: var(--text-muted); }
    .profile-bio { font-size: 1rem; color: var(--text-secondary); margin-bottom: 1.5rem; max-width: 600px; line-height: 1.6; }
    .profile-bio-empty { color: var(--text-muted); font-style: italic; }
    .profile-stats { display: flex; gap: 2rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .profile-stat { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 8px; transition: background 0.3s; cursor: pointer; }
    .profile-stat:hover { background: var(--bg-secondary); }
    .profile-stat-count { font-size: 1.2rem; font-weight: 600; color: var(--text-title); }
    .profile-stat-label { font-size: 0.85rem; color: var(--text-muted); }
    .profile-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .profile-btn { padding: 0.6rem 1.2rem; border-radius: 6px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 0.4rem; border: none; }
    .profile-btn-primary { background: var(--accent); color: var(--btn-text); }
    .profile-btn-primary:hover { background: var(--accent-hover); }
    .profile-btn-secondary { background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); }
    .profile-btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .profile-btn-follow { background: var(--accent); color: var(--btn-text); }
    .profile-btn-follow.followed { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    
    /* 内容区域 */
    .profile-content { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .profile-tabs { display: flex; gap: 0.5rem; border-bottom: 1px solid var(--border-color); margin-bottom: 2rem; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .profile-tab { padding: 1rem 1.5rem; font-size: 0.95rem; color: var(--text-secondary); background: transparent; border: none; cursor: pointer; position: relative; white-space: nowrap; transition: color 0.3s; }
    .profile-tab::after { content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 2px; background: var(--accent); transition: width 0.3s, left 0.3s; }
    .profile-tab:hover { color: var(--accent); }
    .profile-tab.active { color: var(--accent); font-weight: 500; }
    .profile-tab.active::after { width: 60%; left: 20%; }
    .profile-tab-content { display: none; }
    .profile-tab-content.active { display: block; }
    .profile-works-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .profile-work-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; }
    .profile-work-card:hover { transform: translateY(-4px); box-shadow: var(--card-shadow); }
    .profile-work-card-img { width: 100%; height: 180px; object-fit: cover; }
    .profile-work-card-placeholder { width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; background: var(--bg-secondary); color: var(--text-muted); }
    .profile-work-card-body { padding: 1rem; }
    .profile-work-card-title { font-size: 1rem; font-weight: 500; color: var(--text-title); margin-bottom: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .profile-work-card-meta { font-size: 0.85rem; color: var(--text-muted); }
    .profile-empty { text-align: center; padding: 3rem; color: var(--text-muted); }
    .profile-empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    .profile-loading { text-align: center; padding: 3rem; color: var(--text-muted); }
    
    /* 浏览记录/发言记录列表 */
    .profile-record-list { display: flex; flex-direction: column; gap: 1rem; }
    .profile-record-item { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 1rem; display: flex; gap: 1rem; align-items: flex-start; }
    .profile-record-item:hover { border-color: var(--accent); }
    .profile-record-thumb { width: 80px; height: 80px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; color: var(--text-muted); }
    .profile-record-info { flex: 1; min-width: 0; }
    .profile-record-title { font-size: 1rem; font-weight: 500; color: var(--text-title); margin-bottom: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .profile-record-time { font-size: 0.85rem; color: var(--text-muted); }
    
    /* 私信相关 */
    .profile-conversation-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .profile-conversation-item { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 1rem; display: flex; gap: 1rem; align-items: center; cursor: pointer; transition: all 0.3s; }
    .profile-conversation-item:hover { border-color: var(--accent); background: var(--bg-secondary); }
    .profile-conversation-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 600; color: var(--btn-text); flex-shrink: 0; overflow: hidden; }
    .profile-conversation-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-conversation-info { flex: 1; min-width: 0; }
    .profile-conversation-name { font-weight: 500; color: var(--text-title); margin-bottom: 0.2rem; }
    .profile-conversation-preview { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .profile-conversation-time { font-size: 0.75rem; color: var(--text-muted); flex-shrink: 0; }
    .profile-conversation-unread { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    
    /* 编辑资料表单 */
    .profile-edit-form { max-width: 500px; }
    .profile-edit-group { margin-bottom: 1.5rem; }
    .profile-edit-label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-secondary); font-weight: 500; }
    .profile-edit-input { width: 100%; padding: 0.85rem 1rem; border: 1px solid var(--border-color); border-radius: 6px; font-size: 1rem; color: var(--text-primary); background: var(--bg-primary); transition: border-color 0.3s; }
    .profile-edit-input:focus { outline: none; border-color: var(--accent); }
    .profile-edit-textarea { min-height: 120px; resize: vertical; }
    .profile-edit-actions { display: flex; gap: 1rem; }
    
    /* 聊天界面 */
    .profile-chat-container { position: fixed; top: 0; right: 0; width: 400px; height: 100vh; background: var(--card-bg); border-left: 1px solid var(--border-color); box-shadow: -4px 0 20px rgba(0,0,0,0.1); z-index: 1000; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; }
    .profile-chat-container.open { transform: translateX(0); }
    .profile-chat-header { padding: 1rem; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 1rem; }
    .profile-chat-user { display: flex; align-items: center; gap: 0.75rem; flex: 1; }
    .profile-chat-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 600; color: var(--btn-text); overflow: hidden; }
    .profile-chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-chat-name { font-weight: 500; color: var(--text-title); }
    .profile-chat-close { background: none; border: none; cursor: pointer; padding: 0.5rem; color: var(--text-muted); transition: color 0.3s; }
    .profile-chat-close:hover { color: var(--text-primary); }
    .profile-chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .profile-chat-message { max-width: 80%; padding: 0.75rem 1rem; border-radius: 12px; font-size: 0.9rem; line-height: 1.5; }
    .profile-chat-message.sent { align-self: flex-end; background: var(--accent); color: var(--btn-text); border-bottom-right-radius: 4px; }
    .profile-chat-message.received { align-self: flex-start; background: var(--bg-secondary); color: var(--text-primary); border-bottom-left-radius: 4px; }
    .profile-chat-time { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.25rem; text-align: right; }
    .profile-chat-message.sent .profile-chat-time { text-align: right; }
    .profile-chat-input-area { padding: 1rem; border-top: 1px solid var(--border-color); display: flex; gap: 0.75rem; }
    .profile-chat-input { flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--border-color); border-radius: 20px; font-size: 0.9rem; background: var(--bg-primary); color: var(--text-primary); }
    .profile-chat-input:focus { outline: none; border-color: var(--accent); }
    .profile-chat-send { padding: 0.75rem 1.25rem; background: var(--accent); color: var(--btn-text); border: none; border-radius: 20px; cursor: pointer; font-weight: 500; transition: background 0.3s; }
    .profile-chat-send:hover { background: var(--accent-hover); }
    .profile-chat-empty { text-align: center; padding: 2rem; color: var(--text-muted); }
    
    /* 遮罩层 */
    .profile-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 999; opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s; }
    .profile-overlay.visible { opacity: 1; visibility: visible; }
    
    /* 编辑资料 Modal */
    .profile-edit-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1001; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s; }
    .profile-edit-modal.visible { opacity: 1; visibility: visible; }
    .profile-edit-modal-content { background: var(--card-bg); border-radius: 12px; padding: 2rem; width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto; transform: scale(0.9); transition: transform 0.3s; }
    .profile-edit-modal.visible .profile-edit-modal-content { transform: scale(1); }
    .profile-edit-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .profile-edit-modal-title { font-size: 1.3rem; font-weight: 600; color: var(--text-title); }
    .profile-edit-modal-close { background: none; border: none; cursor: pointer; padding: 0.5rem; color: var(--text-muted); transition: color 0.3s; }
    .profile-edit-modal-close:hover { color: var(--text-primary); }
    
    /* 头像上传 */
    .profile-edit-avatar-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 1.5rem; }
    .profile-edit-avatar-preview { width: 100px; height: 100px; border-radius: 50%; background: var(--accent); border: 3px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 700; color: var(--btn-text); overflow: hidden; margin-bottom: 0.75rem; cursor: pointer; transition: border-color 0.3s; }
    .profile-edit-avatar-preview:hover { border-color: var(--accent); }
    .profile-edit-avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
    .profile-edit-avatar-hint { font-size: 0.8rem; color: var(--text-muted); }
    .profile-edit-avatar-input { display: none; }
    
    /* 横幅颜色选择 */
    .profile-edit-banner-colors { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .profile-edit-color-option { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.3s; }
    .profile-edit-color-option:hover { transform: scale(1.1); }
    .profile-edit-color-option.selected { border-color: var(--text-primary); box-shadow: 0 0 0 2px var(--bg-primary); }
    .profile-edit-color-preview { height: 80px; border-radius: 8px; margin-bottom: 1rem; transition: background 0.3s; }
    
    /* 上传状态 */
    .profile-upload-status { font-size: 0.85rem; margin-top: 0.5rem; text-align: center; }
    .profile-upload-status.uploading { color: var(--accent); }
    .profile-upload-status.success { color: #28a745; }
    .profile-upload-status.error { color: #d93025; }
    
    /* 响应式 */
    @media (max-width: 768px) {
      .profile-chat-container { width: 100%; }
      .profile-works-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .profile-stats { gap: 1rem; }
    }
  </style>
</head>
<body>
  <canvas id="petals-canvas"></canvas>
  
  <div class="profile-page" id="profilePage">
    <!-- 返回按钮 -->
    <button class="profile-back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      返回
    </button>

    <!-- 顶部横幅 -->
    <div class="profile-banner" id="profileBanner">
      <!-- 编辑资料按钮（仅本人可见） -->
      <button class="profile-edit-banner-btn" id="editProfileBtn" style="display:none;" onclick="openEditModal()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        编辑资料
      </button>
    </div>

    <!-- 头像区域 -->
    <div class="profile-avatar-section">
      <div class="profile-avatar-wrapper">
        <div class="profile-avatar" id="profileAvatar">
          <span id="avatarInitial">?</span>
        </div>
        <div class="profile-avatar-edit" id="avatarEditBtn" style="display:none;" onclick="document.getElementById('avatarInput').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="handleAvatarUpload(event)">
      </div>
    </div>

    <!-- 用户信息区域 -->
    <div class="profile-info-section">
      <div class="profile-info-header">
        <div>
          <h1 class="profile-username" id="profileUsername">加载中...</h1>
          <p class="profile-joined" id="profileJoined"></p>
        </div>
        <div class="profile-actions" id="profileActions">
          <!-- 动态填充 -->
        </div>
      </div>
      <p class="profile-bio" id="profileBio"></p>

      <!-- 统计信息 -->
      <div class="profile-stats" id="profileStats">
        <div class="profile-stat" id="statFollowing" onclick="switchToTab('works')">
          <span class="profile-stat-count" id="followingCount">0</span>
          <span class="profile-stat-label">关注</span>
        </div>
        <div class="profile-stat" id="statFollowers" onclick="switchToTab('works')">
          <span class="profile-stat-count" id="followersCount">0</span>
          <span class="profile-stat-label">粉丝</span>
        </div>
        <div class="profile-stat" id="statWorks" onclick="switchToTab('works')">
          <span class="profile-stat-count" id="worksCount">0</span>
          <span class="profile-stat-label">作品</span>
        </div>
      </div>
    </div>

    <!-- 内容区域 -->
    <div class="profile-content">
      <!-- Tab 切换 -->
      <div class="profile-tabs">
        <button class="profile-tab active" data-tab="works" onclick="switchToTab('works')">我的作品</button>
        <button class="profile-tab" data-tab="liked" onclick="switchToTab('liked')">点赞过的</button>
        <button class="profile-tab" data-tab="history" onclick="switchToTab('history')" id="tabHistory" style="display:none;">浏览记录</button>
        <button class="profile-tab" data-tab="comments" onclick="switchToTab('comments')" id="tabComments" style="display:none;">发言记录</button>
        <button class="profile-tab" data-tab="messages" onclick="switchToTab('messages')" id="tabMessages" style="display:none;">私信</button>
        <button class="profile-tab" data-tab="about" onclick="switchToTab('about')" id="tabAbout" style="display:none;">关于我</button>
      </div>

      <!-- 我的作品 -->
      <div class="profile-tab-content active" id="contentWorks">
        <div class="profile-loading" id="worksLoading">加载中...</div>
        <div class="profile-works-grid" id="worksGrid"></div>
        <div class="profile-empty" id="worksEmpty" style="display:none;">
          <div class="profile-empty-icon">📭</div>
          <p>还没有发布过作品</p>
        </div>
      </div>

      <!-- 点赞过的 -->
      <div class="profile-tab-content" id="contentLiked">
        <div class="profile-loading" id="likedLoading">加载中...</div>
        <div class="profile-works-grid" id="likedGrid"></div>
        <div class="profile-empty" id="likedEmpty" style="display:none;">
          <div class="profile-empty-icon">♡</div>
          <p>还没有点赞过任何作品</p>
        </div>
      </div>

      <!-- 浏览记录 -->
      <div class="profile-tab-content" id="contentHistory">
        <div class="profile-record-list" id="historyList"></div>
        <div class="profile-empty" id="historyEmpty" style="display:none;">
          <div class="profile-empty-icon">📜</div>
          <p>还没有浏览记录</p>
        </div>
      </div>

      <!-- 发言记录 -->
      <div class="profile-tab-content" id="contentComments">
        <div class="profile-record-list" id="commentsList"></div>
        <div class="profile-empty" id="commentsEmpty" style="display:none;">
          <div class="profile-empty-icon">💬</div>
          <p>还没有发表过评论</p>
        </div>
      </div>

      <!-- 私信 -->
      <div class="profile-tab-content" id="contentMessages">
        <div class="profile-conversation-list" id="conversationList">
          <div class="profile-loading" id="messagesLoading">加载中...</div>
        </div>
        <div class="profile-empty" id="messagesEmpty" style="display:none;">
          <div class="profile-empty-icon">✉️</div>
          <p>还没有私信</p>
        </div>
      </div>

      <!-- 关于我 -->
      <div class="profile-tab-content" id="contentAbout">
        <form class="profile-edit-form" id="aboutForm" onsubmit="saveAbout(event)">
          <div class="profile-edit-group">
            <label class="profile-edit-label">简介</label>
            <textarea class="profile-edit-input profile-edit-textarea" id="editBio" placeholder="介绍一下自己吧..." maxlength="100"></textarea>
          </div>
          <div class="profile-edit-actions">
            <button type="submit" class="profile-btn profile-btn-primary">保存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- 遮罩层 -->
  <div class="profile-overlay" id="profileOverlay" onclick="closeChat()"></div>

  <!-- 聊天容器 -->
  <div class="profile-chat-container" id="chatContainer">
    <div class="profile-chat-header">
      <div class="profile-chat-user">
        <div class="profile-chat-avatar" id="chatAvatar"><span id="chatAvatarInitial">?</span></div>
        <span class="profile-chat-name" id="chatUserName">用户</span>
      </div>
      <button class="profile-chat-close" onclick="closeChat()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

    <div class="profile-chat-messages" id="chatMessages"></div>
    <div class="profile-chat-input-area">
      <input type="text" class="profile-chat-input" id="chatInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMessage()">
      <button class="profile-chat-send" onclick="sendMessage()">发送</button>

  <!-- 编辑资料 Modal -->

        <h2 class="profile-edit-modal-title">编辑资料</h2>
        <button class="profile-edit-modal-close" onclick="closeEditModal()">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      
      <form onsubmit="saveEditProfile(event)">
        <!-- 头像上传 -->
        <div class="profile-edit-avatar-section">
          <div class="profile-edit-avatar-preview" id="editAvatarPreview" onclick="document.getElementById('editAvatarInput').click()">
            <span id="editAvatarInitial">?</span>
          </div>
          <input type="file" id="editAvatarInput" class="profile-edit-avatar-input" accept="image/*" onchange="handleEditAvatarSelect(event)">
          <p class="profile-edit-avatar-hint">点击头像上传新图片</p>
          <p class="profile-upload-status" id="editAvatarStatus"></p>
        </div>
        
        <!-- 头像 URL（隐藏字段） -->
        <input type="hidden" id="editAvatarUrl" value="">
        
        <!-- 横幅颜色选择 -->
        <div class="profile-edit-group">
          <label class="profile-edit-label">背景颜色</label>
          <div class="profile-edit-banner-preview" id="editBannerPreview"></div>
          <div class="profile-edit-banner-colors" id="editBannerColors">
            <div class="profile-edit-color-option selected" data-color="linear-gradient(135deg, #7BA7C4 0%, #5A8FB0 100%)" style="background: linear-gradient(135deg, #7BA7C4 0%, #5A8FB0 100%);" onclick="selectBannerColor(this)"></div>
            <div class="profile-edit-color-option" data-color="linear-gradient(135deg, #E8B4B8 0%, #D4949A 100%)" style="background: linear-gradient(135deg, #E8B4B8 0%, #D4949A 100%);" onclick="selectBannerColor(this)"></div>
            <div class="profile-edit-color-option" data-color="linear-gradient(135deg, #B8D4E8 0%, #94B8D4 100%)" style="background: linear-gradient(135deg, #B8D4E8 0%, #94B8D4 100%);" onclick="selectBannerColor(this)"></div>
            <div class="profile-edit-color-option" data-color="linear-gradient(135deg, #C8E8B8 0%, #A8D494 100%)" style="background: linear-gradient(135deg, #C8E8B8 0%, #A8D494 100%);" onclick="selectBannerColor(this)"></div>
            <div class="profile-edit-color-option" data-color="linear-gradient(135deg, #E8D4B8 0%, #D4B894 100%)" style="background: linear-gradient(135deg, #E8D4B8 0%, #D4B894 100%);" onclick="selectBannerColor(this)"></div>
            <div class="profile-edit-color-option" data-color="linear-gradient(135deg, #D4B8E8 0%, #B894D4 100%)" style="background: linear-gradient(135deg, #D4B8E8 0%, #B894D4 100%);" onclick="selectBannerColor(this)"></div>
          </div>

        <!-- 用户名 -->
        <div class="profile-edit-group">
          <label class="profile-edit-label">用户名</label>
          <input type="text" class="profile-edit-input" id="editUsername" placeholder="输入用户名" maxlength="20" required>
        </div>
        
        <!-- 个人简介 -->
        <div class="profile-edit-group">
          <label class="profile-edit-label">个人简介（最多100字）</label>
          <textarea class="profile-edit-input profile-edit-textarea" id="editBioModal" placeholder="介绍一下自己吧..." maxlength="100"></textarea>
        </div>
        
        <!-- 保存按钮 -->
        <div class="profile-edit-actions">
          <button type="button" class="profile-btn profile-btn-secondary" onclick="closeEditModal()">取消</button>
          <button type="submit" class="profile-btn profile-btn-primary" id="saveProfileBtn">保存</button>

  <!-- 脚本 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/theme-switcher.js"></script>
  <script src="js/petals.js"></script>
  <script src="js/user-auth.js"></script>
  <script>
    // 使用 user-auth.js 的全局实例 window._authClient
    let profileUserId = null;
    let isOwnProfile = false;
    let currentUserId = null;
    let currentUser = null;
    let currentProfileData = null;
    let isFollowing = false;
    let chatPartnerId = null;
    let chatPartnerName = '';
    let realtimeChannel = null;
    
    // 编辑资料相关变量
    let editBannerColor = 'linear-gradient(135deg, #7BA7C4 0%, #5A8FB0 100%)';
    let editAvatarFile = null;

    // 页面加载时初始化
    async function init() {
      console.log('init开始');
      try {
        // 等 user-auth.js 初始化完成
        await new Promise(r => setTimeout(r, 300));
        
        // 使用全局 Supabase 实例
        const client = window._authClient;
        if (!client) {
          console.error('authClient未初始化');
          return;
        }
        
        // 获取当前 session
        const { data: { session } } = await client.auth.getSession();
        const sessionUser = session?.user || null;
        console.log('session:', sessionUser);
        
        // 获取 URL 参数中的用户 ID
        const params = new URLSearchParams(window.location.search);
        const targetUserId = params.get('user');
        console.log('targetUserId from URL:', targetUserId);
        
        // 确定要查看的用户 ID
        const userId = targetUserId || sessionUser?.id;
        console.log('userId to load:', userId);
        
        // 如果没有用户 ID 且没有登录，重定向到登录页
        if (!userId) {
          console.log('没有userId，重定向到登录页');
          window.location.href = 'auth.html?redirect=' + encodeURIComponent(window.location.href);
          return;
        }
        
        profileUserId = userId;
        currentUser = sessionUser;
        currentUserId = sessionUser?.id || null;
        isOwnProfile = (userId === currentUserId);
        console.log('isOwnProfile:', isOwnProfile);
        
        // 加载用户资料
        await loadProfile(userId);
        
        // 如果是本人，继续加载其他数据
        if (isOwnProfile && sessionUser) {
          await loadProfileStats();
          setupOwnProfileTabs();
          await loadUserWorks();
          await loadLikedWorks();
          loadHistory();
          loadComments();
          setupRealtime();
        } else {
          // 访问他人主页
          await loadProfileStats();
          setupOtherProfileTabs();
          await loadUserWorks();
          await loadLikedWorks();
        }
        console.log('init完成');
      } catch (err) {
        console.error('初始化失败:', err);
        document.getElementById('profileUsername').textContent = '加载失败，请刷新重试';
      }
    }
    
    // 访问他人主页时的 Tab 设置
    function setupOtherProfileTabs() {
      // 不显示本人专属的 Tab
      document.getElementById('tabHistory').style.display = 'none';
      document.getElementById('tabComments').style.display = 'none';
      document.getElementById('tabMessages').style.display = 'none';
      document.getElementById('tabAbout').style.display = 'none';
      document.getElementById('avatarEditBtn').style.display = 'none';
      document.getElementById('editProfileBtn').style.display = 'none';
    }
    
    // 加载用户资料（使用 user_id 查询）
    async function loadProfile(userId) {
      console.log('loadProfile开始, userId:', userId);
      const usernameEl = document.getElementById('profileUsername');
      usernameEl.textContent = '加载中...';
      
      const client = window._authClient;
      if (!client) {
        console.error('_authClient 未初始化');
        usernameEl.textContent = '初始化失败';
        document.getElementById('profileBio').innerHTML = '<span class="profile-bio-empty">初始化失败，请刷新重试</span>';
        return;
      }

      try {
        const { data: profile, error } = await client
          .from('profiles')
          .select('*')
          .eq('user_id', userId)
          .single();

        console.log('profiles查询结果:', profile, error);

        if (error || !profile) {
          console.log('profiles无数据，尝试自动创建...');
          
          // 如果是自己但没有资料，自动创建
          const { data: { session } } = await client.auth.getSession();
          if (session && session.user.id === userId) {
            const username = session.user.email.split('@')[0] || '用户';
            try {
              console.log('自动创建资料, username:', username);
              const { error: insertError } = await client.from('profiles').insert({
                user_id: userId,
                username: username
              });
              console.log('自动创建资料结果:', insertError ? insertError : '成功');
              if (!insertError) {
                await loadProfile(userId);
                return;
              }
            } catch (insertErr) {
              console.error('创建资料失败:', insertErr);
            }
          }
          
          usernameEl.textContent = '用户不存在';
          document.getElementById('profileBio').innerHTML = '<span class="profile-bio-empty">无法加载用户资料</span>';
          return;
        }
        
        currentProfileData = profile;
        renderProfile(profile);
        console.log('loadProfile完成');
        
      } catch (err) {
        console.error('loadProfile错误:', err);
        usernameEl.textContent = '加载失败';
        document.getElementById('profileBio').innerHTML = '<span class="profile-bio-empty">无法加载用户资料</span>';
      }
    }
    
    // 渲染用户资料到页面
    function renderProfile(profile) {
      const username = profile.username || '未知用户';
      const bio = profile.bio || '';
      const avatarUrl = profile.avatar_url || '';
      const bannerColor = profile.banner_color || 'linear-gradient(135deg, #7BA7C4 0%, #5A8FB0 100%)';
      const createdAt = profile.created_at;

      // 更新页面显示
      document.getElementById('profileUsername').textContent = username;
      document.getElementById('avatarInitial').textContent = username.charAt(0).toUpperCase();
      document.getElementById('profileBio').innerHTML = bio ? escapeHtml(bio) : '<span class="profile-bio-empty">还没有简介</span>';
      document.getElementById('profileJoined').textContent = createdAt ? '加入于 ' + formatDate(createdAt) : '';
      
      // 更新横幅颜色
      document.getElementById('profileBanner').style.background = bannerColor;
      
      // 更新头像
      if (avatarUrl) {
        document.getElementById('profileAvatar').innerHTML = '<img src="' + escapeHtml(avatarUrl) + '" alt="' + escapeHtml(username) + '">';
      }

      // 更新关于我表单
      document.getElementById('editBio').value = bio || '';

      // 更新操作按钮
      let actionsHtml = '';
      if (isOwnProfile) {
        actionsHtml += '<button class="profile-btn profile-btn-secondary" onclick="switchToTab(\'about\')">编辑资料</button>';
        actionsHtml += '<a href="publish.html" class="profile-btn profile-btn-primary">发布作品</a>';
      } else {
        const userName = profile?.username || '';
        actionsHtml += '<button class="profile-btn profile-btn-follow" id="followBtn" onclick="toggleFollow()">关注</button>';
        actionsHtml += '<button class="profile-btn profile-btn-secondary" onclick="openChat(\'' + profileUserId + '\', \'' + escapeHtml(userName) + '\')">发私信</button>';
      }
      document.getElementById('profileActions').innerHTML = actionsHtml;

      // 检查关注状态
      if (!isOwnProfile) {
        checkFollowStatus();
      }
    }

    async function loadProfileStats() {
      try {
        const { count: followingCount } = await window._authClient.from('follows').select('*', { count: 'exact', head: true }).eq('follower_id', profileUserId);
        const { count: followersCount } = await window._authClient.from('follows').select('*', { count: 'exact', head: true }).eq('following_id', profileUserId);

        let worksCount = 0;
        const { count: worksCnt1 } = await window._authClient.from('works').select('*', { count: 'exact', head: true }).eq('user_id', profileUserId);
        const { count: worksCnt2 } = await window._authClient.from('commissions').select('*', { count: 'exact', head: true }).eq('user_id', profileUserId);
        worksCount = (worksCnt1 || 0) + (worksCnt2 || 0);

        document.getElementById('followingCount').textContent = followingCount || 0;
        document.getElementById('followersCount').textContent = followersCount || 0;
        document.getElementById('worksCount').textContent = worksCount || 0;
      } catch (err) {
        console.error('加载统计失败:', err);
      }
    }

    function setupOwnProfileTabs() {
      // 显示本人专属的 Tab 和按钮
      document.getElementById('tabHistory').style.display = '';
      document.getElementById('tabComments').style.display = '';
      document.getElementById('tabMessages').style.display = '';
      document.getElementById('tabAbout').style.display = '';
      document.getElementById('avatarEditBtn').style.display = '';
      document.getElementById('editProfileBtn').style.display = '';
      
      // 不显示他人主页的操作按钮
      const followBtn = document.getElementById('followBtn');
      if (followBtn) followBtn.style.display = 'none';
    }

    async function loadUserWorks() {
      console.log('loadUserWorks开始, profileUserId:', profileUserId);
      const loadingEl = document.getElementById('worksLoading');
      const gridEl = document.getElementById('worksGrid');
      const emptyEl = document.getElementById('worksEmpty');

      const client = window._authClient;
      if (!client) {
        console.error('_authClient 未初始化');
        loadingEl.textContent = '初始化失败';
        return;
      }

      if (!profileUserId) {
        console.warn('profileUserId 为空，无法加载作品');
        loadingEl.style.display = 'none';
        emptyEl.style.display = '';
        emptyEl.querySelector('p').textContent = '无法加载作品';
        return;
      }

      try {
        // 并行查询 works 和 commissions 表
        const [worksRes, commissionsRes] = await Promise.all([
          client.from('works').select('id, title, type, image_url, images, created_at').eq('user_id', profileUserId).order('created_at', { ascending: false }),
          client.from('commissions').select('id, title, type, image_url, images, created_at, artist').eq('user_id', profileUserId).order('created_at', { ascending: false })
        ]);
        
        console.log('works查询结果:', worksRes.data, worksRes.error);
        console.log('commissions查询结果:', commissionsRes.data, commissionsRes.error);

        const works1 = worksRes.data || [];
        const works2 = commissionsRes.data || [];
        const allWorks = [...works1, ...works2].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

        loadingEl.style.display = 'none';
        console.log('作品总数:', allWorks.length);
        
        if (allWorks.length === 0) {
          emptyEl.style.display = '';
          return;
        }
        emptyEl.style.display = 'none';

        gridEl.innerHTML = allWorks.map(work => {
          let imgUrl = '';
          let images = [];
          try { images = work.images ? (typeof work.images === 'string' ? JSON.parse(work.images) : work.images) : []; } catch(e) {}
          if (images.length > 0 && images[0]) imgUrl = images[0];
          else if (work.image_url) imgUrl = work.image_url;

          const typeLabel = work.artist ? '约稿' : work.type;
          const meta = work.artist ? '画师：' + escapeHtml(work.artist) : formatDate(work.created_at);

          return '<div class="profile-work-card" onclick="viewWork(\'' + work.id + '\', \'' + (work.artist ? 'commission' : 'works') + '\')">' +
            (imgUrl ? '<img src="' + escapeHtml(imgUrl) + '" class="profile-work-card-img" alt="' + escapeHtml(work.title) + '">' : '<div class="profile-work-card-placeholder">📄</div>') +
            '<div class="profile-work-card-body"><h3 class="profile-work-card-title">' + escapeHtml(work.title) + '</h3><p class="profile-work-card-meta">' + typeLabel + ' · ' + meta + '</p></div></div>';
        }).join('');
        console.log('作品渲染完成');
      } catch (err) {
        loadingEl.textContent = '加载失败';
        console.error('加载作品失败:', err);
      }
    }

    async function loadLikedWorks() {
      const loadingEl = document.getElementById('likedLoading');
      const gridEl = document.getElementById('likedGrid');
      const emptyEl = document.getElementById('likedEmpty');

      if (!currentUserId || !isOwnProfile) {
        loadingEl.style.display = 'none';
        emptyEl.style.display = '';
        emptyEl.querySelector('p').textContent = '登录后可查看点赞记录';
        return;
      }

      try {
        const { data: likes } = await window._authClient.from('likes').select('work_id, work_type').eq('user_id', currentUserId);
        if (!likes || likes.length === 0) {
          loadingEl.style.display = 'none';
          emptyEl.style.display = '';
          return;
        }

        let works = [];
        const workIds = likes.filter(l => l.work_type === 'works').map(l => l.work_id);
        const commissionIds = likes.filter(l => l.work_type === 'commission').map(l => l.work_id);

        if (workIds.length > 0) {
          const { data } = await window._authClient.from('works').select('id, title, type, image_url, images, created_at').in('id', workIds);
          if (data) works = works.concat(data.map(w => ({ ...w, work_type: 'works' })));
        }
        if (commissionIds.length > 0) {
          const { data } = await window._authClient.from('commissions').select('id, title, type, image_url, images, created_at, artist').in('id', commissionIds);
          if (data) works = works.concat(data.map(w => ({ ...w, work_type: 'commission' })));
        }

        loadingEl.style.display = 'none';
        if (works.length === 0) {
          emptyEl.style.display = '';
          return;
        }
        emptyEl.style.display = 'none';

        gridEl.innerHTML = works.map(work => {
          let imgUrl = '';
          let images = [];
          try { images = work.images ? (typeof work.images === 'string' ? JSON.parse(work.images) : work.images) : []; } catch(e) {}
          if (images.length > 0 && images[0]) imgUrl = images[0];
          else if (work.image_url) imgUrl = work.image_url;
          const typeLabel = work.artist ? '约稿' : work.type;
          return '<div class="profile-work-card" onclick="viewWork(\'' + work.id + '\', \'' + work.work_type + '\')">' +
            (imgUrl ? '<img src="' + escapeHtml(imgUrl) + '" class="profile-work-card-img" alt="' + escapeHtml(work.title) + '">' : '<div class="profile-work-card-placeholder">📄</div>') +
            '<div class="profile-work-card-body"><h3 class="profile-work-card-title">' + escapeHtml(work.title) + '</h3><p class="profile-work-card-meta">' + typeLabel + ' · ' + formatDate(work.created_at) + '</p></div></div>';
        }).join('');
      } catch (err) {
        loadingEl.textContent = '加载失败';
        console.error('加载点赞记录失败:', err);
      }
    }

    function loadHistory() {
      const listEl = document.getElementById('historyList');
      const emptyEl = document.getElementById('historyEmpty');
      const history = JSON.parse(localStorage.getItem('browse-history') || '[]');

      if (history.length === 0) {
        emptyEl.style.display = '';
        return;
      }
      emptyEl.style.display = 'none';

      listEl.innerHTML = history.map(item => {
        return '<div class="profile-record-item" onclick="viewWork(\'' + item.id + '\', \'' + item.type + '\')">' +
          '<div class="profile-record-thumb">' + (item.type === 'commission' ? '🎨' : '✍️') + '</div>' +
          '<div class="profile-record-info"><h4 class="profile-record-title">' + escapeHtml(item.title) + '</h4><p class="profile-record-time">' + item.time + '</p></div></div>';
      }).join('');
    }

    function loadComments() {
      const listEl = document.getElementById('commentsList');
      const emptyEl = document.getElementById('commentsEmpty');
      const comments = JSON.parse(localStorage.getItem('user-comments') || '[]');

      if (comments.length === 0) {
        emptyEl.style.display = '';
        return;
      }
      emptyEl.style.display = 'none';

      listEl.innerHTML = comments.map(c => {
        return '<div class="profile-record-item"><div class="profile-record-thumb">💬</div>' +
          '<div class="profile-record-info"><h4 class="profile-record-title">' + escapeHtml(c.content) + '</h4><p class="profile-record-time">评论于 ' + c.time + ' · ' + escapeHtml(c.workTitle || '某作品') + '</p></div></div>';
      }).join('');
    }

    async function loadConversations() {
      const listEl = document.getElementById('conversationList');
      const loadingEl = document.getElementById('messagesLoading');
      const emptyEl = document.getElementById('messagesEmpty');

      if (!currentUserId) {
        loadingEl.style.display = 'none';
        emptyEl.style.display = '';
        emptyEl.querySelector('p').textContent = '请先登录';
        return;
      }

      try {
        const { data: messages } = await window._authClient.from('messages').select('*').or('sender_id.eq.' + currentUserId + ',receiver_id.eq.' + currentUserId).order('created_at', { ascending: false });

        const conversationsMap = {};
        (messages || []).forEach(msg => {
          const partnerId = msg.sender_id === currentUserId ? msg.receiver_id : msg.sender_id;
          if (!conversationsMap[partnerId] || new Date(msg.created_at) > new Date(conversationsMap[partnerId].time)) {
            conversationsMap[partnerId] = { partnerId, lastMessage: msg.content, time: msg.created_at, unread: msg.sender_id !== currentUserId && !msg.read };
          }
        });

        const conversations = Object.values(conversationsMap);

        if (conversations.length === 0) {
          loadingEl.style.display = 'none';
          emptyEl.style.display = '';
          return;
        }

        loadingEl.style.display = 'none';
        emptyEl.style.display = 'none';

        let html = '';
        for (const conv of conversations) {
          const { data: profile } = await window._authClient.from('profiles').select('username, avatar_url').eq('user_id', conv.partnerId).single();
          const name = profile?.username || '用户';
          const avatarUrl = profile?.avatar_url || '';
          html += '<div class="profile-conversation-item" onclick="openChat(\'' + conv.partnerId + '\', \'' + escapeHtml(name) + '\')">' +
            '<div class="profile-conversation-avatar">' + (avatarUrl ? '<img src="' + escapeHtml(avatarUrl) + '" alt="">' : name.charAt(0).toUpperCase()) + '</div>' +
            '<div class="profile-conversation-info"><div class="profile-conversation-name">' + escapeHtml(name) + '</div><div class="profile-conversation-preview">' + escapeHtml(conv.lastMessage) + '</div></div>' +
            '<span class="profile-conversation-time">' + formatTime(conv.time) + '</span>' + (conv.unread ? '<span class="profile-conversation-unread"></span>' : '') + '</div>';
        }
        listEl.innerHTML = html;
      } catch (err) {
        loadingEl.textContent = '加载失败';
        console.error('加载私信失败:', err);
      }
    }

    async function checkFollowStatus() {
      if (!currentUserId) return;
      const { data } = await window._authClient.from('follows').select('*').eq('follower_id', currentUserId).eq('following_id', profileUserId).single();
      isFollowing = !!data;

    async function loadChatMessages() {
      if (!currentUserId || !chatPartnerId) return;
      const messagesEl = document.getElementById('chatMessages');

      try {
        const { data: messages } = await window._authClient.from('messages').select('*').or('and(sender_id.eq.' + currentUserId + ',receiver_id.eq.' + chatPartnerId + '),and(sender_id.eq.' + chatPartnerId + ',receiver_id.eq.' + currentUserId + ')').order('created_at', { ascending: true });

        if (!messages || messages.length === 0) {
          messagesEl.innerHTML = '<div class="profile-chat-empty">还没有消息，开始聊天吧~</div>';
          return;
        }

        messagesEl.innerHTML = messages.map(msg => {
          const isSent = msg.sender_id === currentUserId;
          return '<div class="profile-chat-message ' + (isSent ? 'sent' : 'received') + '">' +
            '<div>' + escapeHtml(msg.content) + '</div><div class="profile-chat-time">' + formatTime(msg.created_at) + '</div></div>';
        }).join('');

        messagesEl.scrollTop = messagesEl.scrollHeight;

        await window._authClient.from('messages').update({ read: true }).eq('receiver_id', currentUserId).eq('sender_id', chatPartnerId);
      } catch (err) {
        messagesEl.innerHTML = '<div class="profile-chat-empty">加载失败</div>';
        console.error(err);
      }
    }

      if (!content) return;

      try {
        await window._authClient.from('messages').insert({ sender_id: currentUserId, receiver_id: chatPartnerId, content });
        input.value = '';
        await loadChatMessages();
      } catch (err) {
        alert('发送失败');
        console.error(err);
      }
    }

    function setupRealtime() {
      if (!currentUserId) return;
      if (realtimeChannel) window._authClient.removeChannel(realtimeChannel);

      realtimeChannel = window._authClient.channel('messages-realtime').on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'messages',
        filter: 'receiver_id=eq.' + currentUserId
      }, async payload => {
        if (chatPartnerId && payload.new.sender_id === chatPartnerId) {
          await loadChatMessages();
        }
      }).subscribe();
    }

    function escapeHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function formatDate(str) {
      if (!str) return '';
      const d = new Date(str);
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function formatTime(str) {
      if (!str) return '';
      const d = new Date(str);
      return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }
