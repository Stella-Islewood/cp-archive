<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 | CP同人档案馆</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.addEventListener('load', function() {
      window.sb = supabase.createClient(
        'https://vbvfrmqwlyitarmnhmyw.supabase.co',
        'sb_publishable_SB0uqo25MSjOPA4fb8n-eg_bCBiXMzH'
      );
    });
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; line-height: 1.6; }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; margin: 30px 0; color: #1a73e8; font-size: 24px; }
    
    /* 登录 */
    .login-box { max-width: 360px; margin: 120px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
    .login-box h2 { margin-bottom: 24px; color: #333; }
    .login-box input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }
    .login-box button { width: 100%; padding: 12px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .login-box button:hover { background: #1557b0; }
    .login-error { color: #d93025; margin-top: 10px; display: none; font-size: 14px; }
    
    /* 管理面板 */
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }
    
    /* Tab */
    .tabs { display: flex; background: #fff; border-radius: 10px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .tab-btn { flex: 1; padding: 14px; background: transparent; border: none; font-size: 15px; cursor: pointer; transition: all 0.2s; }
    .tab-btn:hover { background: #f5f5f5; }
    .tab-btn.active { background: #1a73e8; color: #fff; }
    
    /* 内容区 */
    .tab-content { display: none; background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .tab-content.active { display: block; }
    .tab-content h2 { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee; color: #333; font-size: 18px; }
    .tab-content h2 .editing-badge { display: none; font-size: 12px; padding: 2px 8px; background: #f0ad4e; color: #fff; border-radius: 4px; margin-left: 10px; vertical-align: middle; }
    .tab-content h2.editing-mode .editing-badge { display: inline; }
    
    /* 表单 */
    .form-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 200px; }
    .form-group.full { flex: 100%; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #555; font-size: 14px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .btn { padding: 10px 20px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    .btn:hover { background: #1557b0; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-danger { background: #d93025; }
    .btn-danger:hover { background: #a93025; }
    .btn-success { background: #28a745; }
    .btn-success:hover { background: #1e7e34; }
    .btn-warning { background: #f0ad4e; }
    .btn-warning:hover { background: #ec971f; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    
    /* 消息 */
    .msg { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; display: none; font-size: 14px; }
    .msg.success { background: #d4edda; color: #155724; display: block; }
    .msg.error { background: #f8d7da; color: #721c24; display: block; }
    
    /* 图片上传组件 */
    .upload-box { border: 2px dashed #ddd; border-radius: 8px; padding: 20px; text-align: center; background: #fafafa; }
    .upload-box:hover { border-color: #1a73e8; background: #f0f7ff; }
    .upload-preview { max-width: 200px; max-height: 150px; border-radius: 6px; margin: 10px auto; display: block; object-fit: contain; }
    .upload-url-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
    .upload-url-row input { flex: 1; }
    .upload-status { font-size: 12px; color: #666; margin-top: 8px; }
    .upload-status.uploading { color: #1a73e8; }
    .upload-status.success { color: #28a745; }
    .upload-status.error { color: #d93025; }

    /* 多图上传组件 */
    .multi-upload-container { margin-bottom: 16px; }
    .multi-upload-box { border: 2px dashed #ddd; border-radius: 8px; padding: 20px; text-align: center; background: #fafafa; cursor: pointer; transition: all 0.2s; }
    .multi-upload-box:hover { border-color: #1a73e8; background: #f0f7ff; }
    .multi-upload-box.dragover { border-color: #1a73e8; background: #e8f0fe; }
    .multi-upload-hint { font-size: 13px; color: #666; margin-top: 8px; }
    .multi-upload-input { display: none; }
    .multi-upload-status { font-size: 12px; color: #666; margin-top: 8px; }
    .multi-upload-status.uploading { color: #1a73e8; }
    .multi-upload-status.success { color: #28a745; }
    .multi-upload-status.error { color: #d93025; }
    .multi-preview-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    .multi-preview-item { position: relative; width: 80px; height: 80px; border-radius: 6px; overflow: hidden; border: 1px solid #eee; background: #f5f5f5; }
    .multi-preview-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .multi-preview-item.error-img { border-color: #d93025; }
    .multi-preview-item .delete-btn { position: absolute; top: 2px; right: 2px; width: 20px; height: 20px; background: rgba(217, 48, 37, 0.9); color: white; border: none; border-radius: 50%; font-size: 14px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
    .multi-preview-item:hover .delete-btn { opacity: 1; }
    .multi-preview-item .upload-progress { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: #e8eaed; }
    .multi-preview-item .upload-progress-bar { height: 100%; background: #1a73e8; transition: width 0.3s; }
    .multi-preview-item .upload-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; }
    .multi-preview-item .img-index { position: absolute; bottom: 4px; left: 4px; background: rgba(0,0,0,0.6); color: white; font-size: 10px; padding: 1px 5px; border-radius: 3px; }
    .multi-urls-display { margin-top: 12px; }
    .multi-urls-display label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
    .multi-urls-textarea { width: 100%; min-height: 60px; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; font-family: monospace; resize: vertical; background: #fafafa; }
    
    /* 视频上传组件 */
    .video-upload-section { display: flex; gap: 12px; flex-wrap: wrap; }
    .video-source-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .video-source-tab { padding: 8px 16px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
    .video-source-tab.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    .video-embed-preview { background: #f0f7ff; border-radius: 8px; padding: 12px; margin-top: 10px; font-size: 13px; color: #555; }
    
    /* 列表 */
    .data-list { margin-top: 30px; }
    .data-list h3 { margin-bottom: 12px; color: #555; font-size: 16px; }
    .data-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 14px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; background: #fafafa; }
    .data-item:hover { background: #f5f5f5; }
    .data-item.editing { border-color: #f0ad4e; background: #fffaf0; }
    .data-info { flex: 1; }
    .data-info h4 { margin-bottom: 4px; color: #333; }
    .data-info p { font-size: 13px; color: #888; margin-bottom: 3px; }
    .data-meta { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .data-meta span { font-size: 11px; padding: 2px 8px; background: #e8eaed; border-radius: 4px; color: #666; }
    .data-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .empty { text-align: center; padding: 40px; color: #999; }
    .loading { text-align: center; padding: 30px; color: #888; }
    
    /* 媒体库 */
    .media-stats { display: flex; gap: 20px; padding: 16px; background: #f0f7ff; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
    .media-stat { display: flex; align-items: center; gap: 8px; }
    .media-stat strong { color: #1a73e8; }
    .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
    .media-item { border: 1px solid #eee; border-radius: 8px; overflow: hidden; background: #fafafa; }
    .media-item:hover { border-color: #1a73e8; }
    .media-thumb { width: 100%; height: 120px; object-fit: cover; display: block; background: #eee; }
    .media-thumb.video-thumb { display: flex; align-items: center; justify-content: center; color: #888; font-size: 12px; flex-direction: column; gap: 4px; }
    .media-info { padding: 10px; }
    .media-name { font-size: 12px; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 4px; }
    .media-size { font-size: 11px; color: #999; }
    .media-actions { padding: 0 10px 10px; display: flex; gap: 6px; }
    .media-actions .btn { flex: 1; padding: 6px 8px; font-size: 11px; }
    
    @media (max-width: 600px) {
      .form-row { flex-direction: column; }
      .form-group { min-width: 100%; }
      .data-item { flex-direction: column; gap: 10px; }
      .data-actions { width: 100%; }
      .video-upload-section { flex-direction: column; }
      .media-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .character-cards { grid-template-columns: 1fr !important; }
      .tabs { flex-wrap: wrap; }
      .tab-btn { flex: 1 1 45%; font-size: 13px; padding: 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CP同人档案馆 - 后台管理</h1>
    
    <!-- 登录框 -->
    <div class="login-box" id="loginBox">
      <h2>管理员登录</h2>
      <input type="password" id="passwordInput" placeholder="请输入管理员密码" autocomplete="off">
      <button onclick="doLogin()">登 录</button>
      <p class="login-error" id="loginError">密码错误，请重试</p>
    </div>
    
    <!-- 管理面板 -->
    <div class="admin-panel" id="adminPanel">
      
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('timeline')">时间线</button>
        <button class="tab-btn" onclick="switchTab('commission')">约稿</button>
        <button class="tab-btn" onclick="switchTab('works')">创作</button>
        <button class="tab-btn" onclick="switchTab('character')">角色</button>
        <button class="tab-btn" onclick="switchTab('media')">媒体库</button>
      </div>
      
      <!-- 时间线 -->
      <div class="tab-content active" id="tab-timeline">
        <h2 id="tl-form-title">添加时间线节点<span class="editing-badge">编辑中</span></h2>
        <div class="msg" id="msg-timeline"></div>
        <form id="form-timeline" onsubmit="submitTimeline(event)">
          <input type="hidden" id="tl-editing-id" value="">
          <div class="form-row">
            <div class="form-group">
              <label>站点</label>
              <select id="tl-site">
                <option value="lionmio">LionMio</option>
                <option value="lucasmia">LucasMia</option>
              </select>
            </div>
            <div class="form-group">
              <label>日期 (YYYY-MM-DD)</label>
              <input type="text" id="tl-date" placeholder="2026-03-27" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>标题</label>
              <input type="text" id="tl-title" placeholder="事件标题" required>
            </div>
            <div class="form-group">
              <label>心情标签</label>
              <input type="text" id="tl-mood" placeholder="如：开心、期待">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group full">
              <label>内容</label>
              <textarea id="tl-content" placeholder="详细描述..."></textarea>
            </div>
          </div>
          <div class="btn-group">
            <button type="submit" class="btn" id="tl-submit-btn">添加节点</button>
            <button type="button" class="btn btn-warning" id="tl-cancel-btn" style="display:none;" onclick="cancelEditTimeline()">取消编辑</button>
          </div>
        </form>
        
        <div class="data-list">
          <h3>已有节点</h3>
          <div id="list-timeline"><div class="loading">加载中...</div></div>
        </div>
      </div>
      
      <!-- 约稿 -->
      <div class="tab-content" id="tab-commission">
        <h2 id="cm-form-title">添加约稿<span class="editing-badge">编辑中</span></h2>
        <div class="msg" id="msg-commission"></div>
        <form id="form-commission" onsubmit="submitCommission(event)">
          <input type="hidden" id="cm-editing-id" value="">
          <div class="form-row">
            <div class="form-group">
              <label>站点</label>
              <select id="cm-site">
                <option value="lionmio">LionMio</option>
                <option value="lucasmia">LucasMia</option>
              </select>
            </div>
            <div class="form-group">
              <label>内容类型</label>
              <select id="cm-type" onchange="toggleCommissionFields()">
                <option value="图片">图片</option>
                <option value="文字">文字</option>
                <option value="音乐">音乐</option>
                <option value="视频">视频</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>标题</label>
              <input type="text" id="cm-title" placeholder="约稿标题" required>
            </div>
            <div class="form-group">
              <label>画师名</label>
              <input type="text" id="cm-artist" placeholder="画师昵称" required>
            </div>
          </div>

          <!-- 图片类型字段 -->
          <div id="cm-field-image">
            <div class="form-group full">
              <label>图片上传（支持多张）</label>
              <div class="multi-upload-container">
                <div class="multi-upload-box" id="cm-multi-upload-box">
                  <input type="file" id="cm-multi-file-input" class="multi-upload-input" accept="image/*" multiple onchange="handleCommissionMultiFileSelect(event)">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#666" stroke-width="1.5" style="margin-bottom:8px;">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <path d="M21 15l-5-5L5 21"/>
                  </svg>
                  <div style="font-size:14px;color:#333;margin-bottom:4px;">点击或拖拽图片到此处上传</div>
                  <div class="multi-upload-hint">支持 jpg、png、gif、webp，可上传多张图片</div>
                </div>
                <div class="multi-preview-list" id="cm-multi-preview-list"></div>
                <div class="multi-upload-status" id="cm-multi-upload-status"></div>
                <div class="multi-urls-display">
                  <label>已上传的图片URL（自动更新）：</label>
                  <textarea class="multi-urls-textarea" id="cm-images" placeholder="上传图片后自动填入，可手动编辑"></textarea>
                </div>
              </div>
            </div>
          </div>

          <!-- 文字类型字段 -->
          <div id="cm-field-text" style="display:none;">
            <div class="form-row">
              <div class="form-group full">
                <label>文字内容</label>
                <textarea id="cm-text" placeholder="约稿文字内容..." style="min-height:120px;"></textarea>
              </div>
            </div>
          </div>

          <!-- 音乐类型字段 -->
          <div id="cm-field-music" style="display:none;">
            <div class="form-row">
              <div class="form-group full">
                <label>音乐链接</label>
                <input type="text" id="cm-music" placeholder="https://music.163.com/...">
              </div>
            </div>
          </div>

          <!-- 视频类型字段 -->
          <div id="cm-field-video" style="display:none;">
            <div class="form-group full">
              <label>视频上传</label>
              <div class="upload-box" id="cm-video-upload-box">
                <input type="file" id="cm-video-file-input" accept="video/*" style="display:none;" onchange="handleCommissionVideoSelect(event)">
                <button type="button" class="btn btn-sm" onclick="document.getElementById('cm-video-file-input').click()">选择视频</button>
                <div class="upload-status" id="cm-video-upload-status"></div>
              </div>
              <div class="upload-url-row">
                <input type="text" id="cm-video" placeholder="视频URL（上传后自动填入，也可手动输入链接）">
                <button type="button" class="btn btn-sm btn-success" onclick="manualFillUrl('cm-video')">确认URL</button>
              </div>
              <p style="font-size:12px;color:#888;margin-top:8px;">支持 mp4、webm 视频格式</p>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group full">
              <label>创始人笔记</label>
              <textarea id="cm-notes" placeholder="关于这张约稿的故事..."></textarea>
            </div>
          </div>
          <div class="btn-group">
            <button type="submit" class="btn" id="cm-submit-btn">添加约稿</button>
            <button type="button" class="btn btn-warning" id="cm-cancel-btn" style="display:none;" onclick="cancelEditCommission()">取消编辑</button>
          </div>
        </form>

        <div class="data-list">
          <h3>已有约稿</h3>
          <div id="list-commission"><div class="loading">加载中...</div></div>
        </div>
      </div>
      
      <!-- 创作 -->
      <div class="tab-content" id="tab-works">
        <h2 id="wk-form-title">添加创作<span class="editing-badge">编辑中</span></h2>
        <div class="msg" id="msg-works"></div>
        <form id="form-works" onsubmit="submitWorks(event)">
          <input type="hidden" id="wk-editing-id" value="">
          <div class="form-row">
            <div class="form-group">
              <label>站点</label>
              <select id="wk-site">
                <option value="lionmio">LionMio</option>
                <option value="lucasmia">LucasMia</option>
              </select>
            </div>
            <div class="form-group">
              <label>类型</label>
              <select id="wk-type" onchange="toggleWorksFields()">
                <option value="文字">文字</option>
                <option value="图片">图片</option>
                <option value="音乐">音乐</option>
                <option value="视频">视频</option>
                <option value="玩偶">玩偶</option>
                <option value="游戏">游戏</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>标题</label>
              <input type="text" id="wk-title" placeholder="作品标题" required>
            </div>
            <div class="form-group">
              <label>作者</label>
              <input type="text" id="wk-author" placeholder="作者昵称">
            </div>
          </div>
          
          <!-- 图片/玩偶/游戏类型字段 -->
          <div id="wk-field-image">
            <div class="form-group full">
              <label>图片上传（支持多张）</label>
              <div class="multi-upload-container">
                <div class="multi-upload-box" id="wk-multi-upload-box">
                  <input type="file" id="wk-multi-file-input" class="multi-upload-input" accept="image/*" multiple onchange="handleWorksMultiFileSelect(event)">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#666" stroke-width="1.5" style="margin-bottom:8px;">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <path d="M21 15l-5-5L5 21"/>
                  </svg>
                  <div style="font-size:14px;color:#333;margin-bottom:4px;">点击或拖拽图片到此处上传</div>
                  <div class="multi-upload-hint">支持 jpg、png、gif、webp，可上传多张图片</div>
                </div>
                <div class="multi-preview-list" id="wk-multi-preview-list"></div>
                <div class="multi-upload-status" id="wk-multi-upload-status"></div>
                <div class="multi-urls-display">
                  <label>已上传的图片URL（自动更新）：</label>
                  <textarea class="multi-urls-textarea" id="wk-images" placeholder="上传图片后自动填入，可手动编辑"></textarea>
                </div>
              </div>
            </div>
          </div>

          <!-- 文字类型字段 -->
          <div id="wk-field-text" style="display:none;">
            <div class="form-group full">
              <label>文字内容</label>
              <textarea id="wk-text" placeholder="作品文字内容..." style="min-height:150px;"></textarea>
            </div>
          </div>

          <!-- 音乐类型字段 -->
          <div id="wk-field-music" style="display:none;">
            <div class="form-group full">
              <label>音乐链接</label>
              <input type="text" id="wk-music" placeholder="https://music.163.com/...">
            </div>
          </div>

          <!-- 视频类型字段 -->
          <div id="wk-field-video" style="display:none;">
            <div class="form-group full">
              <label>视频</label>

  <script>
    // Supabase 配置
    const ADMIN_PW = 'lionmio2024';
    
    // 检查登录状态
    if (sessionStorage.getItem('adminLoggedIn') === 'true') {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminPanel').classList.add('active');
      loadAll();
    }
    
    // 登录
    function doLogin() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === ADMIN_PW) {
        sessionStorage.setItem('adminLoggedIn', 'true');
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').classList.add('active');
        loadAll();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }
    
    // 回车登录
    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') doLogin();
    });
    
    // Tab 切换
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`.tab-btn[onclick="switchTab('${name}')"]`).classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
      if (name === 'media') {
        loadMediaLibrary();
      }
      if (name === 'character') {
        loadCharacters();
      }
    }
    
    // 显示消息
    function showMsg(id, type, text) {
      const el = document.getElementById(id);
      el.className = 'msg ' + type;
      el.textContent = text;
      setTimeout(() => { el.className = 'msg'; }, 3000);
    }
    
    // HTML转义
    function h(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
    
    // 格式化日期
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }
    
    // 加载所有数据
    function loadAll() {
      loadTimeline();
      loadCommission();
      loadWorks();
      loadCharacters();
      loadMediaLibrary();
    }
    
    // ========== 图片/视频上传到 Supabase Storage ==========
    
    async function uploadImage(file) {
      const fileName = `${Date.now()}-${file.name}`;
      const { data, error } = await window.sb.storage
        .from('media')
        .upload(fileName, file, { upsert: true });
      if (error) throw error;
      const { data: urlData } = window.sb.storage
        .from('media')
        .getPublicUrl(fileName);
      return urlData.publicUrl;
    }
    
    async function uploadVideo(file) {
      const fileName = `${Date.now()}-${file.name}`;
      const { data, error } = await window.sb.storage
        .from('media')
        .upload(fileName, file, { upsert: true });
      if (error) throw error;
      const { data: urlData } = window.sb.storage
        .from('media')
        .getPublicUrl(fileName);
      return urlData.publicUrl;
    }
    
    // 手动确认URL
    function manualFillUrl(inputId) {
      const val = document.getElementById(inputId).value.trim();
      if (val) {
        const tab = inputId.startsWith('cm') ? 'commission' : 'works';
        showMsg('msg-' + tab, 'success', 'URL已确认填入');
      }
    }
    
    // ========== 约稿多图上传处理 ==========

    // 约稿多图上传状态管理
    const cmMultiUploadState = {
      files: [], // 存储待上传的文件
      urls: [], // 存储已上传的URL
      uploading: false
    };

    // 约稿多图拖拽上传
    function setupCommissionMultiUpload() {
      const uploadBox = document.getElementById('cm-multi-upload-box');
      const fileInput = document.getElementById('cm-multi-file-input');

      if (!uploadBox || !fileInput) return;

      // 点击上传
      uploadBox.addEventListener('click', function() {
        if (!cmMultiUploadState.uploading) {
          fileInput.click();
        }
      });

      // 拖拽上传
      uploadBox.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.stopPropagation();
        uploadBox.classList.add('dragover');
      });

      uploadBox.addEventListener('dragleave', function(e) {
        e.preventDefault();
        e.stopPropagation();
        uploadBox.classList.remove('dragover');
      });

      uploadBox.addEventListener('drop', function(e) {
        e.preventDefault();
        e.stopPropagation();
        uploadBox.classList.remove('dragover');
        const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
        if (files.length > 0) {
          handleCommissionMultiFiles(files);
        }
      });
    }

    // 处理约稿多文件选择
    function handleCommissionMultiFileSelect(event) {
      const files = Array.from(event.target.files);
      if (files.length > 0) {
        handleCommissionMultiFiles(files);
      }
      // 清空input以允许重新选择相同文件
      event.target.value = '';
    }

    // 处理约稿多文件上传
    async function handleCommissionMultiFiles(files) {
      cmMultiUploadState.files = cmMultiUploadState.files.concat(files);

      // 显示预览
      renderCommissionMultiPreviews();

      // 上传所有未上传的文件
      await uploadCommissionPendingFiles();
    }

    // 渲染约稿多图预览
    function renderCommissionMultiPreviews() {
      const list = document.getElementById('cm-multi-preview-list');
      if (!list) return;

      list.innerHTML = cmMultiUploadState.files.map((file, index) => {
        const isUploaded = cmMultiUploadState.urls[index] !== undefined;
        const url = cmMultiUploadState.urls[index] || '';
        const previewUrl = url || URL.createObjectURL(file);

        return `
          <div class="multi-preview-item ${isUploaded ? '' : 'error-img'}" data-index="${index}">
            <img src="${previewUrl}" alt="预览">
            ${!isUploaded ? '<div class="upload-overlay">等待上传</div>' : ''}
            <span class="img-index">${index + 1}</span>
            <button type="button" class="delete-btn" onclick="removeCommissionImage(${index})" title="删除">×</button>
            <div class="upload-progress"><div class="upload-progress-bar" style="width:${isUploaded ? '100' : '0'}%"></div></div>
          </div>
        `;
      }).join('');

      // 更新URL显示
      updateCommissionImagesUrl();
    }

    // 更新约稿图片URL文本框
    function updateCommissionImagesUrl() {
      const textarea = document.getElementById('cm-images');
      if (textarea) {
        textarea.value = JSON.stringify(cmMultiUploadState.urls.filter(u => u));
      }
    }

    // 上传约稿待上传的文件
    async function uploadCommissionPendingFiles() {
      if (cmMultiUploadState.uploading) return;
      cmMultiUploadState.uploading = true;

      const status = document.getElementById('cm-multi-upload-status');
      status.textContent = '正在上传...';
      status.className = 'multi-upload-status uploading';

      try {
        for (let i = 0; i < cmMultiUploadState.files.length; i++) {
          if (cmMultiUploadState.urls[i] === undefined) {
            const file = cmMultiUploadState.files[i];
            const url = await uploadImage(file);
            cmMultiUploadState.urls[i] = url;
            renderCommissionMultiPreviews();
          }
        }

        status.textContent = '上传完成！';
        status.className = 'multi-upload-status success';
        updateCommissionImagesUrl();

        // 3秒后清除状态消息
        setTimeout(() => {
          if (status.textContent === '上传完成！') {
            status.textContent = '';
            status.className = 'multi-upload-status';
          }
        }, 3000);
      } catch (err) {
        status.textContent = '上传失败: ' + err.message;
        status.className = 'multi-upload-status error';
      }

      cmMultiUploadState.uploading = false;
    }

    // 删除约稿图片
    function removeCommissionImage(index) {
      if (index < 0 || index >= cmMultiUploadState.files.length) return;

      cmMultiUploadState.files.splice(index, 1);
      cmMultiUploadState.urls.splice(index, 1);
      renderCommissionMultiPreviews();
      updateCommissionImagesUrl();
    }

    // 重置约稿多图上传状态
    function resetCommissionMultiUpload() {
      cmMultiUploadState.files = [];
      cmMultiUploadState.urls = [];
      cmMultiUploadState.uploading = false;
      renderCommissionMultiPreviews();
      updateCommissionImagesUrl();
      document.getElementById('cm-multi-upload-status').textContent = '';
    }

    // 初始化约稿多图上传
    setupCommissionMultiUpload();

      const uploadSection = document.getElementById('wk-video-upload-section');

      const tabs = document.querySelectorAll('.video-source-tab');
      
      tabs.forEach(tab => tab.classList.remove('active'));
      
      if (source === 'upload') {
        uploadSection.style.display = '';
        embedSection.style.display = 'none';
        tabs[0].classList.add('active');
      } else {
        uploadSection.style.display = 'none';
        embedSection.style.display = '';
        tabs[1].classList.add('active');
      }

    function previewVideoEmbed(url) {
      const preview = document.getElementById('wk-video-embed-preview');
      const embedUrl = convertToEmbedUrl(url);
      
      if (embedUrl) {
        preview.style.display = '';
        preview.innerHTML = `<strong>嵌入预览：</strong>将转换为以下iframe<br>
        <code style="word-break:break-all;font-size:11px;">${h(embedUrl)}</code>
        <br><br>
        <button type="button" class="btn btn-sm btn-success" onclick="applyVideoEmbed()">应用此嵌入</button>`;
        preview.dataset.embedUrl = embedUrl;
      } else if (url.trim()) {

    function convertToEmbedUrl(url) {
      if (!url) return null;
      url = url.trim();
      
      // Bilibili
      const bilibiliMatch = url.match(/bilibili\.com\/video\/([A-Za-z0-9]+)/i) || 
                           url.match(/b23\.tv\/([A-Za-z0-9]+)/i);
      if (bilibiliMatch) {
        return `//player.bilibili.com/player.html?bvid=${bilibiliMatch[1]}`;
      }
      
      // YouTube
      const youtubeMatch = url.match(/youtube\.com\/watch\?v=([A-Za-z0-9_-]+)/i) ||
                          url.match(/youtu\.be\/([A-Za-z0-9_-]+)/i);
      if (youtubeMatch) {
        return `https://www.youtube.com/embed/${youtubeMatch[1]}`;
      }
      
      return null;
    }

    };

    // 加载角色列表
    async function loadCharacters() {
      const listEl = document.getElementById('characterList');
      listEl.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const { data, error } = await window.sb
          .from('characters')
          .select('*')
          .order('name', { ascending: true });

        if (error) throw error;

        if (!data || data.length === 0) {
          listEl.innerHTML = '<p class="empty">暂无角色数据</p>';
          return;
        }

        listEl.innerHTML = '<div class="character-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-top:16px;">' +
          data.map(char => {
            const traits = char.traits ? (Array.isArray(char.traits) ? char.traits.join(', ') : JSON.parse(char.traits || '[]').join(', ')) : '';
            return `
              <div class="data-item" style="flex-direction:column;gap:12px;">
                <div style="display:flex;align-items:center;gap:12px;">
                  <div class="profile-avatar-small" style="width:50px;height:50px;border-radius:50%;overflow:hidden;background:var(--accent,#1a73e8);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:bold;flex-shrink:0;">
                    ${char.avatar_url ? '<img src="' + h(char.avatar_url) + '" style="width:100%;height:100%;object-fit:cover;" alt="">' : char.name.charAt(0).toUpperCase()}
                  </div>
                  <div class="data-info" style="flex:1;">
                    <h4>${h(char.name)}</h4>
                    <p style="font-size:12px;color:#666;">${h(char.tagline || '')}</p>
                  </div>
                </div>
                <div class="data-meta" style="margin-top:4px;">
                  ${traits.split(',').filter(t => t.trim()).map(t => '<span>' + h(t.trim()) + '</span>').join('')}
                </div>
                <div class="data-actions" style="margin-top:8px;">
                  <button class="btn btn-sm" onclick="editCharacter('${h(char.id)}')">编辑</button>
                </div>
              </div>
            `;
          }).join('') +
          '</div>';
      } catch (err) {
        console.error('加载角色失败:', err);
        listEl.innerHTML = '<p class="empty">加载失败: ' + h(err.message) + '</p>';
      }
    }

    // 编辑角色
    async function editCharacter(id) {
      try {
        const { data, error } = await window.sb
          .from('characters')
          .select('*')
          .eq('id', id)
          .single();

        if (error) throw error;
        if (!data) return;

        // 显示编辑表单
        document.getElementById('characterEditForm').style.display = 'block';
        document.getElementById('char-submit-btn').style.display = 'inline-block';
        document.getElementById('char-cancel-btn').style.display = 'none';
        document.getElementById('char-form-title').classList.add('editing-mode');

        // 填充表单
        document.getElementById('char-editing-id').value = data.id;
        document.getElementById('char-editing-name').value = data.name;
        document.getElementById('char-name').value = data.name;
        document.getElementById('char-tagline').value = data.tagline || '';
        document.getElementById('char-birthday').value = data.birthday || '';
        document.getElementById('char-height').value = data.height || '';
        document.getElementById('char-description').value = data.description || '';
        document.getElementById('char-quote').value = data.quote || '';
        document.getElementById('char-relationship').value = data.relationship || '';

        // 处理性格标签
        let traitsStr = '';
        if (data.traits) {
          if (Array.isArray(data.traits)) {
            traitsStr = data.traits.join(', ');
          } else {
            try {
              traitsStr = JSON.parse(data.traits).join(', ');
            } catch (e) {
              traitsStr = data.traits;
            }
          }
        }
        document.getElementById('char-traits').value = traitsStr;

        // 处理头像
        document.getElementById('char-avatar-url').value = data.avatar_url || '';
        const avatarPreview = document.getElementById('char-avatar-preview');
        if (data.avatar_url) {
          avatarPreview.src = data.avatar_url;
          avatarPreview.style.display = 'block';
        } else {
          avatarPreview.style.display = 'none';
        }

        // 处理图集
        let imagesUrls = [];
        if (data.images) {
          if (Array.isArray(data.images)) {
            imagesUrls = data.images;
          } else {
            try {
              imagesUrls = JSON.parse(data.images);
            } catch (e) {
              imagesUrls = [];
            }
          }
        }

        // 重置并设置状态
        resetCharMultiUpload();
        charMultiUploadState.urls = imagesUrls;
        document.getElementById('char-images').value = JSON.stringify(imagesUrls);
        renderCharMultiPreviews();

      } catch (err) {
        console.error('编辑角色失败:', err);
        showMsg('msg-character', 'error', '加载角色信息失败: ' + err.message);
      }
    }

    // 头像上传处理
    async function handleCharAvatarSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      const statusEl = document.getElementById('char-avatar-status');
      const previewEl = document.getElementById('char-avatar-preview');

      // 显示本地预览
      const reader = new FileReader();
      reader.onload = function(e) {
        previewEl.src = e.target.result;
        previewEl.style.display = 'block';
      };
      reader.readAsDataURL(file);

      // 上传
      statusEl.textContent = '上传中...';
      statusEl.className = 'upload-status uploading';

      try {
        const url = await uploadImage(file);
        document.getElementById('char-avatar-url').value = url;
        statusEl.textContent = '上传成功';
        statusEl.className = 'upload-status success';
      } catch (err) {
        console.error('上传头像失败:', err);
        statusEl.textContent = '上传失败: ' + err.message;
        statusEl.className = 'upload-status error';
        previewEl.style.display = 'none';
      }
    }

    // 角色多图上传 - 初始化拖拽
    function setupCharMultiUpload() {
      const uploadBox = document.getElementById('char-multi-upload-box');
      const fileInput = document.getElementById('char-multi-file-input');

      if (!uploadBox || !fileInput) return;

      uploadBox.addEventListener('click', function() {
        fileInput.click();
      });

      uploadBox.addEventListener('dragover', function(e) {
        e.preventDefault();
        uploadBox.classList.add('dragover');
      });

      uploadBox.addEventListener('dragleave', function(e) {
        e.preventDefault();
        uploadBox.classList.remove('dragover');
      });

      uploadBox.addEventListener('drop', function(e) {
        e.preventDefault();
        uploadBox.classList.remove('dragover');
        const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
        if (files.length > 0) {
          handleCharMultiFiles(files);
        }
      });
    }

    // 角色多图 - 文件选择
    function handleCharMultiFileSelect(event) {
      const files = Array.from(event.target.files);
      if (files.length > 0) {
        handleCharMultiFiles(files);
      }
      event.target.value = '';
    }

    // 角色多图 - 处理文件
    async function handleCharMultiFiles(files) {
      const statusEl = document.getElementById('char-multi-upload-status');
      statusEl.textContent = '正在上传 ' + files.length + ' 张图片...';
      statusEl.className = 'multi-upload-status uploading';

      // 添加到待上传列表（用于预览）
      const newPendingFiles = files.map((file, index) => ({
        id: Date.now() + '-' + index,
        file: file,
        status: 'pending',
        url: null,
        preview: URL.createObjectURL(file)
      }));

      charMultiUploadState.pendingFiles = charMultiUploadState.pendingFiles.concat(newPendingFiles);
      renderCharMultiPreviews();

      // 上传所有文件
      let successCount = 0;
      let errorCount = 0;

      for (const item of newPendingFiles) {
        try {
          item.status = 'uploading';
          renderCharMultiPreviews();

          const url = await uploadImage(item.file);
          item.url = url;
          item.status = 'success';
          charMultiUploadState.urls.push(url);
          successCount++;
        } catch (err) {
          console.error('上传图片失败:', err);
          item.status = 'error';
          errorCount++;
        }
        renderCharMultiPreviews();
      }

      // 更新URL文本框
      document.getElementById('char-images').value = JSON.stringify(charMultiUploadState.urls);

      // 更新状态
      if (errorCount > 0) {
        statusEl.textContent = '上传完成：' + successCount + ' 成功，' + errorCount + ' 失败';
        statusEl.className = 'multi-upload-status error';
      } else {
        statusEl.textContent = '上传完成：' + successCount + ' 张图片已上传';
        statusEl.className = 'multi-upload-status success';
      }

      // 清除待上传列表
      charMultiUploadState.pendingFiles = [];
    }

    // 角色多图 - 渲染预览
    function renderCharMultiPreviews() {
      const listEl = document.getElementById('char-multi-preview-list');
      if (!listEl) return;

      const allItems = [
        ...charMultiUploadState.urls.map((url, index) => ({
          id: 'url-' + index,
          url: url,
          status: 'success',
          isUrl: true
        })),
        ...charMultiUploadState.pendingFiles.map(item => ({
          id: item.id,
          url: item.preview,
          status: item.status,
          isUrl: false
        }))
      ];

      if (allItems.length === 0) {
        listEl.innerHTML = '';
        return;
      }

      listEl.innerHTML = allItems.map((item, index) => {
        let overlayHtml = '';
        if (item.status === 'uploading') {
          overlayHtml = '<div class="upload-overlay">上传中...</div>';
        } else if (item.status === 'error') {
          overlayHtml = '<div class="upload-overlay">失败</div>';
        }

        return '<div class="multi-preview-item ' + (item.status === 'error' ? 'error-img' : '') + '" data-id="' + h(item.id) + '">' +
          '<img src="' + h(item.url) + '" alt="预览">' +
          overlayHtml +
          '<button class="delete-btn" onclick="removeCharImage(\'' + h(item.id) + '\')" title="删除">×</button>' +
          '<span class="img-index">' + (index + 1) + '</span>' +
          '</div>';
      }).join('');
    }

    // 角色多图 - 删除图片
    function removeCharImage(id) {
      if (id.startsWith('url-')) {
        const index = parseInt(id.replace('url-', ''));
        charMultiUploadState.urls.splice(index, 1);
      } else {
        charMultiUploadState.pendingFiles = charMultiUploadState.pendingFiles.filter(f => f.id !== id);
      }
      document.getElementById('char-images').value = JSON.stringify(charMultiUploadState.urls);
      renderCharMultiPreviews();
    }

    // 角色多图 - 重置上传
    function resetCharMultiUpload() {
      charMultiUploadState.urls = [];
      charMultiUploadState.pendingFiles = [];
      charMultiUploadState.uploading = false;
      document.getElementById('char-multi-preview-list').innerHTML = '';
      document.getElementById('char-multi-upload-status').textContent = '';
      document.getElementById('char-multi-upload-status').className = 'multi-upload-status';
    }

    // 提交角色更新
    async function submitCharacter() {
      const id = document.getElementById('char-editing-id').value;
      if (!id) {
        showMsg('msg-character', 'error', '请先选择一个角色进行编辑');
        return;
      }

      const btn = document.getElementById('char-submit-btn');
      btn.disabled = true;
      btn.textContent = '保存中...';

      try {
        const tagline = document.getElementById('char-tagline').value.trim();
        const birthday = document.getElementById('char-birthday').value.trim();
        const height = document.getElementById('char-height').value.trim();
        const traits = document.getElementById('char-traits').value.trim();
        const description = document.getElementById('char-description').value.trim();
        const quote = document.getElementById('char-quote').value.trim();
        const relationship = document.getElementById('char-relationship').value.trim();
        const avatar_url = document.getElementById('char-avatar-url').value.trim();

        // 处理图集URL
        let imagesUrls = [];
        const imagesInput = document.getElementById('char-images').value.trim();
        if (imagesInput) {
          try {
            imagesUrls = JSON.parse(imagesInput);
          } catch (e) {
            imagesUrls = [];
          }
        }

        const { error } = await window.sb
          .from('characters')
          .update({
            tagline: tagline,
            birthday: birthday,
            height: height,
            traits: JSON.stringify(traits.split(',').map(t => t.trim()).filter(t => t)),
            description: description,
            quote: quote,
            relationship: relationship,
            avatar_url: avatar_url,
            images: JSON.stringify(imagesUrls),
            updated_at: new Date().toISOString()
          })
          .eq('id', id);

        if (error) throw error;

        showMsg('msg-character', 'success', '角色信息已更新');

        // 重置表单
        cancelEditCharacter();
        loadCharacters();

      } catch (err) {
        console.error('保存角色失败:', err);
        showMsg('msg-character', 'error', '保存失败: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '保存更新';
      }
    }

    // 取消编辑角色
    function cancelEditCharacter() {
      document.getElementById('characterEditForm').style.display = 'none';
      document.getElementById('char-form-title').classList.remove('editing-mode');
      document.getElementById('char-submit-btn').style.display = 'inline-block';
      document.getElementById('char-cancel-btn').style.display = 'none';
      document.getElementById('char-editing-id').value = '';
      document.getElementById('char-editing-name').value = '';
      document.getElementById('char-name').value = '';
      document.getElementById('char-tagline').value = '';
      document.getElementById('char-birthday').value = '';
      document.getElementById('char-height').value = '';
      document.getElementById('char-traits').value = '';
      document.getElementById('char-description').value = '';
      document.getElementById('char-quote').value = '';
      document.getElementById('char-relationship').value = '';
      document.getElementById('char-avatar-url').value = '';
      document.getElementById('char-avatar-preview').style.display = 'none';
      resetCharMultiUpload();
    }

    // 初始化角色多图上传
    window.addEventListener('load', function() {
      setupCharMultiUpload();
    });
    
    // ========== 媒体库 ==========
    
    async function loadMediaLibrary() {
      const el = document.getElementById('media-grid');
      el.innerHTML = '<div class="loading">加载中...</div>';
      
      try {
        const { data, error } = await window.sb.storage
          .from('media')
          .list('', { limit: 100, sortBy: { column: 'created_at', order: 'desc' } });
        
        if (error) throw error;
        
        document.getElementById('media-count').textContent = data ? data.length : 0;
        
        if (!data || data.length === 0) {
          el.innerHTML = '<p class="empty">暂无上传的文件</p>';
          return;
        }
        
        // 过滤掉文件夹
        const files = data.filter(f => f.id && f.name);
        
        if (files.length === 0) {
          el.innerHTML = '<p class="empty">暂无上传的文件</p>';
          return;
        }
        
        el.innerHTML = files.map(file => {
          const isImage = /\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(file.name) || 
                         file.metadata?.mimetype?.startsWith('image/');
          const isVideo = file.metadata?.mimetype?.startsWith('video/');
          const size = formatFileSize(file.metadata?.size || 0);
          const url = getMediaPublicUrl(file.name);
          
          if (isImage) {
            return `
              <div class="media-item" data-file="${h(file.name)}">
                <img src="${h(url)}" class="media-thumb" alt="${h(file.name)}" loading="lazy" onclick="copyMediaUrl('${h(url.replace(/'/g, "\\'"))}')" style="cursor:pointer;" title="点击复制链接">
                <div class="media-info">
                  <div class="media-name" title="${h(file.name)}">${h(file.name)}</div>
                  <div class="media-size">${size}</div>
                </div>
                <div class="media-actions">
                  <button class="btn btn-sm" onclick="copyMediaUrl('${h(url.replace(/'/g, "\\'"))}')">复制链接</button>
                  <button class="btn btn-danger btn-sm" onclick="deleteMediaFile('${h(file.name)}')">删除</button>
                </div>
              </div>
            `;
          } else if (isVideo) {
            return `
              <div class="media-item" data-file="${h(file.name)}">
                <div class="media-thumb video-thumb">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                  </svg>
                  <span>视频文件</span>
                </div>
                <div class="media-info">
                  <div class="media-name" title="${h(file.name)}">${h(file.name)}</div>
                  <div class="media-size">${size}</div>
                </div>
                <div class="media-actions">
                  <button class="btn btn-sm" onclick="copyMediaUrl('${h(url.replace(/'/g, "\\'"))}')">复制链接</button>
                  <button class="btn btn-danger btn-sm" onclick="deleteMediaFile('${h(file.name)}')">删除</button>
                </div>
              </div>
            `;
          } else {
            return `
              <div class="media-item" data-file="${h(file.name)}">
                <div class="media-thumb video-thumb">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1">
                    <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                    <polyline points="13 2 13 9 20 9"/>
                  </svg>
                  <span>文件</span>
                </div>
                <div class="media-info">
                  <div class="media-name" title="${h(file.name)}">${h(file.name)}</div>
                  <div class="media-size">${size}</div>
                </div>
                <div class="media-actions">
                  <button class="btn btn-sm" onclick="copyMediaUrl('${h(url.replace(/'/g, "\\'"))}')">复制链接</button>
                  <button class="btn btn-danger btn-sm" onclick="deleteMediaFile('${h(file.name)}')">删除</button>
                </div>
              </div>
            `;
          }
        }).join('');
        
      } catch (error) {
        el.innerHTML = '<p class="empty">加载失败: ' + h(error.message) + '</p>';
      }
    }
    
    function getMediaPublicUrl(fileName) {
      const { data } = window.sb.storage.from('media').getPublicUrl(fileName);
      return data.publicUrl;
    }
    
    function formatFileSize(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }
    
    function copyMediaUrl(url) {
      navigator.clipboard.writeText(url).then(() => {
        showMsg('msg-media', 'success', '链接已复制到剪贴板！');
      }).catch(() => {
        // fallback
        const input = document.createElement('input');
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        showMsg('msg-media', 'success', '链接已复制到剪贴板！');
      });
    }
    
    async function deleteMediaFile(fileName) {
      if (!confirm('确定要删除文件 "' + fileName + '" 吗？')) return;
      
      try {
        const { error } = await window.sb.storage
          .from('media')
          .remove([fileName]);
        
        if (error) throw error;
        
        showMsg('msg-media', 'success', '文件已删除！');
        loadMediaLibrary();
      } catch (error) {
        showMsg('msg-media', 'error', '删除失败: ' + error.message);
      }
    }
  </script>
</body>
