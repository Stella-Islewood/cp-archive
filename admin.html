<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 | CP同人档案馆</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.addEventListener('load', function() {
      window.sb = supabase.createClient(
        'https://vbvfrmqwlyitarmnhmyw.supabase.co',
        'sb_publishable_SB0uqo25MSjOPA4fb8n-eg_bCBiXMzH'
      );
    });
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; line-height: 1.6; }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; margin: 30px 0; color: #1a73e8; font-size: 24px; }
    
    /* 登录 */
    .login-box { max-width: 360px; margin: 120px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
    .login-box h2 { margin-bottom: 24px; color: #333; }
    .login-box input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }
    .login-box button { width: 100%; padding: 12px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .login-box button:hover { background: #1557b0; }
    .login-error { color: #d93025; margin-top: 10px; display: none; font-size: 14px; }
    
    /* 管理面板 */
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }
    
    /* Tab */
    .tabs { display: flex; background: #fff; border-radius: 10px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .tab-btn { flex: 1; padding: 14px; background: transparent; border: none; font-size: 15px; cursor: pointer; transition: all 0.2s; }
    .tab-btn:hover { background: #f5f5f5; }
    .tab-btn.active { background: #1a73e8; color: #fff; }
    
    /* 内容区 */
    .tab-content { display: none; background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .tab-content.active { display: block; }
    .tab-content h2 { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee; color: #333; font-size: 18px; }
    
    /* 表单 */
    .form-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 200px; }
    .form-group.full { flex: 100%; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #555; font-size: 14px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .btn { padding: 10px 20px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    .btn:hover { background: #1557b0; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-danger { background: #d93025; }
    .btn-danger:hover { background: #a93025; }
    
    /* 消息 */
    .msg { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; display: none; font-size: 14px; }
    .msg.success { background: #d4edda; color: #155724; display: block; }
    .msg.error { background: #f8d7da; color: #721c24; display: block; }
    
    /* 列表 */
    .data-list { margin-top: 30px; }
    .data-list h3 { margin-bottom: 12px; color: #555; font-size: 16px; }
    .data-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 14px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; background: #fafafa; }
    .data-item:hover { background: #f5f5f5; }
    .data-info { flex: 1; }
    .data-info h4 { margin-bottom: 4px; color: #333; }
    .data-info p { font-size: 13px; color: #888; margin-bottom: 3px; }
    .data-meta { display: flex; gap: 8px; margin-top: 6px; }
    .data-meta span { font-size: 11px; padding: 2px 8px; background: #e8eaed; border-radius: 4px; color: #666; }
    .data-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .empty { text-align: center; padding: 40px; color: #999; }
    .loading { text-align: center; padding: 30px; color: #888; }

    @media (max-width: 600px) {
      .form-row { flex-direction: column; }
      .form-group { min-width: 100%; }
      .data-item { flex-direction: column; gap: 10px; }
      .data-actions { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CP同人档案馆 - 后台管理</h1>
    
    <!-- 登录框 -->
    <div class="login-box" id="loginBox">
      <h2>管理员登录</h2>
      <input type="password" id="passwordInput" placeholder="请输入管理员密码" autocomplete="off">
      <button onclick="doLogin()">登 录</button>
      <p class="login-error" id="loginError">密码错误，请重试</p>
    </div>
    
    <!-- 管理面板 -->
    <div class="admin-panel" id="adminPanel">
      
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('timeline')">时间线</button>
        <button class="tab-btn" onclick="switchTab('commission')">约稿</button>
        <button class="tab-btn" onclick="switchTab('works')">创作</button>
      </div>
      
      <!-- 时间线 -->
      <div class="tab-content active" id="tab-timeline">
        <h2>添加时间线节点</h2>
        <div class="msg" id="msg-timeline"></div>
        <form id="form-timeline" onsubmit="submitTimeline(event)">
          <div class="form-row">
            <div class="form-group">
              <label>站点</label>
              <select id="tl-site">
                <option value="lionmio">LionMio</option>
                <option value="lucasmia">LucasMia</option>
              </select>
            </div>
            <div class="form-group">
              <label>日期 (YYYY-MM-DD)</label>
              <input type="text" id="tl-date" placeholder="2026-03-27" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>标题</label>
              <input type="text" id="tl-title" placeholder="事件标题" required>
            </div>
            <div class="form-group">
              <label>心情标签</label>
              <input type="text" id="tl-mood" placeholder="如：开心、期待">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group full">
              <label>内容</label>
              <textarea id="tl-content" placeholder="详细描述..."></textarea>
            </div>
          </div>
          <button type="submit" class="btn">添加节点</button>
        </form>
        
        <div class="data-list">
          <h3>已有节点</h3>
          <div id="list-timeline"><div class="loading">加载中...</div></div>
        </div>
      </div>
      
      <!-- 约稿 -->
      <div class="tab-content" id="tab-commission">
        <h2>添加约稿</h2>
        <div class="msg" id="msg-commission"></div>
        <form id="form-commission" onsubmit="submitCommission(event)">
          <div class="form-row">
            <div class="form-group">
              <label>站点</label>
              <select id="cm-site">
                <option value="lionmio">LionMio</option>
                <option value="lucasmia">LucasMia</option>
              </select>
            </div>
            <div class="form-group">
              <label>标题</label>
              <input type="text" id="cm-title" placeholder="约稿标题" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>画师名</label>
              <input type="text" id="cm-artist" placeholder="画师昵称" required>
            </div>
            <div class="form-group">
              <label>图片 URL</label>
              <input type="text" id="cm-image" placeholder="https://...">
              <p style="font-size:12px;color:#888;margin-top:4px;">可填写图床链接，如 imgur、SM.MS 等</p>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group full">
              <label>创始人笔记</label>
              <textarea id="cm-notes" placeholder="关于这张约稿的故事..."></textarea>
            </div>
          </div>
          <button type="submit" class="btn">添加约稿</button>
        </form>
        
        <div class="data-list">
          <h3>已有约稿</h3>
          <div id="list-commission"><div class="loading">加载中...</div></div>
        </div>
      </div>
      
      <!-- 创作 -->
      <div class="tab-content" id="tab-works">
        <h2>添加创作</h2>
        <div class="msg" id="msg-works"></div>
        <form id="form-works" onsubmit="submitWorks(event)">
          <div class="form-row">
            <div class="form-group">
              <label>站点</label>
              <select id="wk-site">
                <option value="lionmio">LionMio</option>
                <option value="lucasmia">LucasMia</option>
              </select>
            </div>
            <div class="form-group">
              <label>类型</label>
              <select id="wk-type">
                <option value="文字">文字</option>
                <option value="图片">图片</option>
                <option value="音乐">音乐</option>
                <option value="视频">视频</option>
                <option value="玩偶">玩偶</option>
                <option value="游戏">游戏</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>标题</label>
              <input type="text" id="wk-title" placeholder="作品标题" required>
            </div>
            <div class="form-group">
              <label>作者</label>
              <input type="text" id="wk-author" placeholder="作者昵称">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group full">
              <label>内容 / 图片 URL</label>
              <textarea id="wk-content" placeholder="作品内容或图片链接..."></textarea>
            </div>
          </div>
          <button type="submit" class="btn">添加创作</button>
        </form>
        
        <div class="data-list">
          <h3>已有创作</h3>
          <div id="list-works"><div class="loading">加载中...</div></div>
        </div>
      </div>
      
    </div>
  </div>

  <script>
    // Supabase 配置
    const ADMIN_PW = 'lionmio2024';
    
    // 检查登录状态
    if (sessionStorage.getItem('adminLoggedIn') === 'true') {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminPanel').classList.add('active');
      loadAll();
    }
    
    // 登录
    function doLogin() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === ADMIN_PW) {
        sessionStorage.setItem('adminLoggedIn', 'true');
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').classList.add('active');
        loadAll();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }
    
    // 回车登录
    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') doLogin();
    });
    
    // Tab 切换
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`.tab-btn[onclick="switchTab('${name}')"]`).classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
    }
    
    // 显示消息
    function showMsg(id, type, text) {
      const el = document.getElementById(id);
      el.className = 'msg ' + type;
      el.textContent = text;
      setTimeout(() => { el.className = 'msg'; }, 3000);
    }
    
    // HTML转义
    function h(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
    
    // 加载所有数据
    function loadAll() {
      loadTimeline();
      loadCommission();
      loadWorks();
    }
    
    // ========== 时间线 ==========
    
    async function submitTimeline(e) {
      e.preventDefault();
      const data = {
        archive_id: document.getElementById('tl-site').value,
        date: document.getElementById('tl-date').value,
        title: document.getElementById('tl-title').value,
        content: document.getElementById('tl-content').value,
        mood_tag: document.getElementById('tl-mood').value,
        created_at: new Date().toISOString()
      };
      const { error } = await window.sb.from('timeline').insert([data]);
      if (error) {
        showMsg('msg-timeline', 'error', '保存失败: ' + error.message);
      } else {
        showMsg('msg-timeline', 'success', '✅ 保存成功！');
        document.getElementById('form-timeline').reset();
        loadTimeline();
      }
    }
    
    async function loadTimeline() {
      const { data, error } = await window.sb.from('timeline').select('*').order('created_at', { ascending: false });
      const el = document.getElementById('list-timeline');
      if (error) { el.innerHTML = '<p class="empty">加载失败: ' + error.message + '</p>'; return; }
      if (!data || data.length === 0) { el.innerHTML = '<p class="empty">暂无数据</p>'; return; }
      el.innerHTML = data.map(item => `
        <div class="data-item">
          <div class="data-info">
            <h4>${h(item.title)}</h4>
            <p>${h(item.content || '无内容')}</p>
            <div class="data-meta">
              <span>${h(item.date)}</span>
              <span>${h(item.mood_tag || '无')}</span>
              <span>${h(item.archive_id)}</span>
            </div>
          </div>
          <div class="data-actions">
            <button class="btn btn-danger btn-sm" onclick="delTimeline('${item.id}')">删除</button>
          </div>
        </div>
      `).join('');
    }
    
    async function delTimeline(id) {
      if (!confirm('确定删除？')) return;
      const { error } = await window.sb.from('timeline').delete().eq('id', id);
      if (error) showMsg('msg-timeline', 'error', '删除失败');
      else { showMsg('msg-timeline', 'success', '✅ 删除成功'); loadTimeline(); }
    }
    
    // ========== 约稿 ==========
    
    async function submitCommission(e) {
      e.preventDefault();
      const data = {
        archive_id: document.getElementById('cm-site').value,
        title: document.getElementById('cm-title').value,
        artist: document.getElementById('cm-artist').value,
        image_url: document.getElementById('cm-image').value,
        founder_notes: document.getElementById('cm-notes').value,
        created_at: new Date().toISOString()
      };
      const { error } = await window.sb.from('commissions').insert([data]);
      if (error) {
        showMsg('msg-commission', 'error', '保存失败: ' + error.message);
      } else {
        showMsg('msg-commission', 'success', '✅ 保存成功！');
        document.getElementById('form-commission').reset();
        loadCommission();
      }
    }
    
    async function loadCommission() {
      const { data, error } = await window.sb.from('commissions').select('*').order('created_at', { ascending: false });
      const el = document.getElementById('list-commission');
      if (error) { el.innerHTML = '<p class="empty">加载失败: ' + error.message + '</p>'; return; }
      if (!data || data.length === 0) { el.innerHTML = '<p class="empty">暂无数据</p>'; return; }
      el.innerHTML = data.map(item => `
        <div class="data-item">
          <div class="data-info">
            <h4>${h(item.title)}</h4>
            <p>画师: ${h(item.artist)}</p>
            ${item.image_url ? `<p>图片: <a href="${h(item.image_url)}" target="_blank">查看</a></p>` : ''}
            ${item.founder_notes ? `<p>笔记: ${h(item.founder_notes.substring(0, 60))}...</p>` : ''}
            <div class="data-meta">
              <span>${h(item.archive_id)}</span>
            </div>
          </div>
          <div class="data-actions">
            <button class="btn btn-danger btn-sm" onclick="delCommission('${item.id}')">删除</button>
          </div>
        </div>
      `).join('');
    }
    
    async function delCommission(id) {
      if (!confirm('确定删除？')) return;
      const { error } = await window.sb.from('commissions').delete().eq('id', id);
      if (error) showMsg('msg-commission', 'error', '删除失败');
      else { showMsg('msg-commission', 'success', '✅ 删除成功'); loadCommission(); }
    }
    
    // ========== 创作 ==========
    
    async function submitWorks(e) {
      e.preventDefault();
      const data = {
        archive_id: document.getElementById('wk-site').value,
        type: document.getElementById('wk-type').value,
        title: document.getElementById('wk-title').value,
        author: document.getElementById('wk-author').value,
        content: document.getElementById('wk-content').value,
        created_at: new Date().toISOString()
      };
      const { error } = await window.sb.from('works').insert([data]);
      if (error) {
        showMsg('msg-works', 'error', '保存失败: ' + error.message);
      } else {
        showMsg('msg-works', 'success', '✅ 保存成功！');
        document.getElementById('form-works').reset();
        loadWorks();
      }
    }
    
    async function loadWorks() {
      const { data, error } = await window.sb.from('works').select('*').order('created_at', { ascending: false });
      const el = document.getElementById('list-works');
      if (error) { el.innerHTML = '<p class="empty">加载失败: ' + error.message + '</p>'; return; }
      if (!data || data.length === 0) { el.innerHTML = '<p class="empty">暂无数据</p>'; return; }
      el.innerHTML = data.map(item => `
        <div class="data-item">
          <div class="data-info">
            <h4>${h(item.title)}</h4>
            <p>作者: ${h(item.author || '未知')} | 类型: ${h(item.type)}</p>
            ${item.content ? `<p>内容: ${h(item.content.substring(0, 60))}...</p>` : ''}
            <div class="data-meta">
              <span>${h(item.archive_id)}</span>
            </div>
          </div>
          <div class="data-actions">
            <button class="btn btn-danger btn-sm" onclick="delWorks('${item.id}')">删除</button>
          </div>
        </div>
      `).join('');
    }
    
    async function delWorks(id) {
      if (!confirm('确定删除？')) return;
      const { error } = await window.sb.from('works').delete().eq('id', id);
      if (error) showMsg('msg-works', 'error', '删除失败');
      else { showMsg('msg-works', 'success', '✅ 删除成功'); loadWorks(); }
    }
  </script>
</body>
</html>
