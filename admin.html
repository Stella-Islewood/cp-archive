<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 | CP同人档案馆</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.addEventListener('load', function() {
      window.sb = supabase.createClient(
        'https://vbvfrmqwlyitarmnhmyw.supabase.co',
        'sb_publishable_SB0uqo25MSjOPA4fb8n-eg_bCBiXMzH'
      );
    });
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; line-height: 1.6; }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; margin: 30px 0; color: #1a73e8; font-size: 24px; }
    
    /* 登录 */
    .login-box { max-width: 360px; margin: 120px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
    .login-box h2 { margin-bottom: 24px; color: #333; }
    .login-box input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }
    .login-box button { width: 100%; padding: 12px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .login-box button:hover { background: #1557b0; }
    .login-error { color: #d93025; margin-top: 10px; display: none; font-size: 14px; }
    
    /* 管理面板 */
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }
    
    /* Tab */
    .tabs { display: flex; background: #fff; border-radius: 10px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .tab-btn { flex: 1; padding: 14px; background: transparent; border: none; font-size: 15px; cursor: pointer; transition: all 0.2s; }
    .tab-btn:hover { background: #f5f5f5; }
    .tab-btn.active { background: #1a73e8; color: #fff; }
    
    /* 内容区 */
    .tab-content { display: none; background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .tab-content.active { display: block; }
    .tab-content h2 { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee; color: #333; font-size: 18px; }
    
    /* 表单 */
    .form-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 200px; }
    .form-group.full { flex: 100%; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #555; font-size: 14px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .btn { padding: 10px 20px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    .btn:hover { background: #1557b0; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-danger { background: #d93025; }
    .btn-danger:hover { background: #a93025; }
    .btn-success { background: #28a745; }
    .btn-success:hover { background: #1e7e34; }
    
    /* 消息 */
    .msg { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; display: none; font-size: 14px; }
    .msg.success { background: #d4edda; color: #155724; display: block; }
    .msg.error { background: #f8d7da; color: #721c24; display: block; }
    
    /* 图片上传组件 */
    .upload-box { border: 2px dashed #ddd; border-radius: 8px; padding: 20px; text-align: center; background: #fafafa; }
    .upload-box:hover { border-color: #1a73e8; background: #f0f7ff; }
    .upload-preview { max-width: 200px; max-height: 150px; border-radius: 6px; margin: 10px auto; display: block; object-fit: contain; }
    .upload-url-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
    .upload-url-row input { flex: 1; }
    .upload-status { font-size: 12px; color: #666; margin-top: 8px; }
    .upload-status.uploading { color: #1a73e8; }
    .upload-status.success { color: #28a745; }
    .upload-status.error { color: #d93025; }
    
    /* 视频上传组件 */
    .video-upload-section { display: flex; gap: 12px; flex-wrap: wrap; }
    .video-source-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .video-source-tab { padding: 8px 16px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
    .video-source-tab.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    .video-embed-preview { background: #f0f7ff; border-radius: 8px; padding: 12px; margin-top: 10px; font-size: 13px; color: #555; }
    
    /* 列表 */
    .data-list { margin-top: 30px; }
    .data-list h3 { margin-bottom: 12px; color: #555; font-size: 16px; }
    .data-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 14px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; background: #fafafa; }
    .data-item:hover { background: #f5f5f5; }
    .data-info { flex: 1; }
    .data-info h4 { margin-bottom: 4px; color: #333; }
    .data-info p { font-size: 13px; color: #888; margin-bottom: 3px; }
    .data-meta { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .data-meta span { font-size: 11px; padding: 2px 8px; background: #e8eaed; border-radius: 4px; color: #666; }
    .data-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .empty { text-align: center; padding: 40px; color: #999; }
    .loading { text-align: center; padding: 30px; color: #888; }
    
    /* 媒体库 */
    .media-stats { display: flex; gap: 20px; padding: 16px; background: #f0f7ff; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
    .media-stat { display: flex; align-items: center; gap: 8px; }
    .media-stat strong { color: #1a73e8; }
    .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
    .media-item { border: 1px solid #eee; border-radius: 8px; overflow: hidden; background: #fafafa; }
    .media-item:hover { border-color: #1a73e8; }
    .media-thumb { width: 100%; height: 120px; object-fit: cover; display: block; background: #eee; }
    .media-thumb.video-thumb { display: flex; align-items: center; justify-content: center; color: #888; font-size: 12px; flex-direction: column; gap: 4px; }
    .media-info { padding: 10px; }
    .media-name { font-size: 12px; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 4px; }
    .media-size { font-size: 11px; color: #999; }
    .media-actions { padding: 0 10px 10px; display: flex; gap: 6px; }
    .media-actions .btn { flex: 1; padding: 6px 8px; font-size: 11px; }
    
    @media (max-width: 600px) {
      .form-row { flex-direction: column; }
      .form-group { min-width: 100%; }
      .data-item { flex-direction: column; gap: 10px; }
      .data-actions { width: 100%; }
      .video-upload-section { flex-direction: column; }
      .media-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CP同人档案馆 - 后台管理</h1>
    
    <!-- 登录框 -->
    <div class="login-box" id="loginBox">
      <h2>管理员登录</h2>
      <input type="password" id="passwordInput" placeholder="请输入管理员密码" autocomplete="off">
      <button onclick="doLogin()">登 录</button>
      <p class="login-error" id="loginError">密码错误，请重试</p>
    </div>
    
    <!-- 管理面板 -->
    <div class="admin-panel" id="adminPanel">
      
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('timeline')">时间线</button>
        <button class="tab-btn" onclick="switchTab('commission')">约稿</button>
        <button class="tab-btn" onclick="switchTab('works')">创作</button>
        <button class="tab-btn" onclick="switchTab('media')">媒体库</button>
      </div>
      
      <!-- 时间线 -->
      <div class="tab-content active" id="tab-timeline">
        <h2>添加时间线节点</h2>
        <div class="msg" id="msg-timeline"></div>
        <form id="form-timeline" onsubmit="submitTimeline(event)">
          <div class="form-row">
            <div class="form-group">
              <label>站点</label>
              <select id="tl-site">
                <option value="lionmio">LionMio</option>
                <option value="lucasmia">LucasMia</option>
              </select>
            </div>
            <div class="form-group">
              <label>日期 (YYYY-MM-DD)</label>
              <input type="text" id="tl-date" placeholder="2026-03-27" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>标题</label>
              <input type="text" id="tl-title" placeholder="事件标题" required>
            </div>
            <div class="form-group">
              <label>心情标签</label>
              <input type="text" id="tl-mood" placeholder="如：开心、期待">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group full">
              <label>内容</label>
              <textarea id="tl-content" placeholder="详细描述..."></textarea>
            </div>
          </div>
          <button type="submit" class="btn">添加节点</button>
        </form>
        
        <div class="data-list">
          <h3>已有节点</h3>
          <div id="list-timeline"><div class="loading">加载中...</div></div>
        </div>
      </div>
      
      <!-- 约稿 -->
      <div class="tab-content" id="tab-commission">
        <h2>添加约稿</h2>
        <div class="msg" id="msg-commission"></div>
        <form id="form-commission" onsubmit="submitCommission(event)">
          <div class="form-row">
            <div class="form-group">
              <label>站点</label>
              <select id="cm-site">
                <option value="lionmio">LionMio</option>
                <option value="lucasmia">LucasMia</option>
              </select>
            </div>
            <div class="form-group">
              <label>内容类型</label>
              <select id="cm-type" onchange="toggleCommissionFields()">
                <option value="图片">图片</option>
                <option value="文字">文字</option>
                <option value="音乐">音乐</option>
                <option value="视频">视频</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>标题</label>
              <input type="text" id="cm-title" placeholder="约稿标题" required>
            </div>
            <div class="form-group">
              <label>画师名</label>
              <input type="text" id="cm-artist" placeholder="画师昵称" required>
            </div>
          </div>

          <!-- 图片类型字段 -->
          <div id="cm-field-image">
            <div class="form-group full">
              <label>图片上传</label>
              <div class="upload-box" id="cm-upload-box">
                <input type="file" id="cm-file-input" accept="image/*" style="display:none;" onchange="handleCommissionFileSelect(event)">
                <button type="button" class="btn btn-sm" onclick="document.getElementById('cm-file-input').click()">选择图片</button>
                <img id="cm-preview" class="upload-preview" style="display:none;" alt="预览">
                <div class="upload-status" id="cm-upload-status"></div>
              </div>
              <div class="upload-url-row">
                <input type="text" id="cm-image" placeholder="图片URL（上传后自动填入，也可手动输入）">
                <button type="button" class="btn btn-sm btn-success" onclick="manualFillUrl('cm-image')">确认URL</button>
              </div>
              <p style="font-size:12px;color:#888;margin-top:8px;">支持 jpg、png、gif、webp 图片格式</p>
            </div>
          </div>

          <!-- 文字类型字段 -->
          <div id="cm-field-text" style="display:none;">
            <div class="form-row">
              <div class="form-group full">
                <label>文字内容</label>
                <textarea id="cm-text" placeholder="约稿文字内容..." style="min-height:120px;"></textarea>
              </div>
            </div>
          </div>

          <!-- 音乐类型字段 -->
          <div id="cm-field-music" style="display:none;">
            <div class="form-row">
              <div class="form-group full">
                <label>音乐链接</label>
                <input type="text" id="cm-music" placeholder="https://music.163.com/...">
              </div>
            </div>
          </div>

          <!-- 视频类型字段 -->
          <div id="cm-field-video" style="display:none;">
            <div class="form-group full">
              <label>视频上传</label>
              <div class="upload-box" id="cm-video-upload-box">
                <input type="file" id="cm-video-file-input" accept="video/*" style="display:none;" onchange="handleCommissionVideoSelect(event)">
                <button type="button" class="btn btn-sm" onclick="document.getElementById('cm-video-file-input').click()">选择视频</button>
                <div class="upload-status" id="cm-video-upload-status"></div>
              </div>
              <div class="upload-url-row">
                <input type="text" id="cm-video" placeholder="视频URL（上传后自动填入，也可手动输入链接）">
                <button type="button" class="btn btn-sm btn-success" onclick="manualFillUrl('cm-video')">确认URL</button>
              </div>
              <p style="font-size:12px;color:#888;margin-top:8px;">支持 mp4、webm 视频格式</p>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group full">
              <label>创始人笔记</label>
              <textarea id="cm-notes" placeholder="关于这张约稿的故事..."></textarea>
            </div>
          </div>
          <button type="submit" class="btn">添加约稿</button>
        </form>

        <div class="data-list">
          <h3>已有约稿</h3>
          <div id="list-commission"><div class="loading">加载中...</div></div>
        </div>
      </div>
      
      <!-- 创作 -->
      <div class="tab-content" id="tab-works">
        <h2>添加创作</h2>
        <div class="msg" id="msg-works"></div>
        <form id="form-works" onsubmit="submitWorks(event)">
          <div class="form-row">
            <div class="form-group">
              <label>站点</label>
              <select id="wk-site">
                <option value="lionmio">LionMio</option>
                <option value="lucasmia">LucasMia</option>
              </select>
            </div>
            <div class="form-group">
              <label>类型</label>
              <select id="wk-type" onchange="toggleWorksFields()">
                <option value="文字">文字</option>
                <option value="图片">图片</option>
                <option value="音乐">音乐</option>
                <option value="视频">视频</option>
                <option value="玩偶">玩偶</option>
                <option value="游戏">游戏</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>标题</label>
              <input type="text" id="wk-title" placeholder="作品标题" required>
            </div>
            <div class="form-group">
              <label>作者</label>
              <input type="text" id="wk-author" placeholder="作者昵称">
            </div>
          </div>
          
          <!-- 图片/玩偶/游戏类型字段 -->
          <div id="wk-field-image">
            <div class="form-group full">
              <label>图片上传</label>
              <div class="upload-box" id="wk-upload-box">
                <input type="file" id="wk-file-input" accept="image/*" style="display:none;" onchange="handleWorksFileSelect(event)">
                <button type="button" class="btn btn-sm" onclick="document.getElementById('wk-file-input').click()">选择图片</button>
                <img id="wk-preview" class="upload-preview" style="display:none;" alt="预览">
                <div class="upload-status" id="wk-upload-status"></div>
              </div>
              <div class="upload-url-row">
                <input type="text" id="wk-image" placeholder="图片URL（上传后自动填入，也可手动输入）">
                <button type="button" class="btn btn-sm btn-success" onclick="manualFillUrl('wk-image')">确认URL</button>
              </div>
            </div>
          </div>

          <!-- 文字类型字段 -->
          <div id="wk-field-text" style="display:none;">
            <div class="form-group full">
              <label>文字内容</label>
              <textarea id="wk-text" placeholder="作品文字内容..." style="min-height:150px;"></textarea>
            </div>
          </div>

          <!-- 音乐类型字段 -->
          <div id="wk-field-music" style="display:none;">
            <div class="form-group full">
              <label>音乐链接</label>
              <input type="text" id="wk-music" placeholder="https://music.163.com/...">
            </div>
          </div>

          <!-- 视频类型字段 -->
          <div id="wk-field-video" style="display:none;">
            <div class="form-group full">
              <label>视频</label>
              <div class="video-source-tabs">
                <button type="button" class="video-source-tab active" onclick="switchVideoSource('upload')">本地上传</button>
                <button type="button" class="video-source-tab" onclick="switchVideoSource('embed')">链接嵌入</button>
              </div>
              <!-- 本地上传 -->
              <div id="wk-video-upload-section">
                <div class="upload-box">
                  <input type="file" id="wk-video-file-input" accept="video/*" style="display:none;" onchange="handleWorksVideoSelect(event)">
                  <button type="button" class="btn btn-sm" onclick="document.getElementById('wk-video-file-input').click()">选择视频文件</button>
                  <div class="upload-status" id="wk-video-upload-status"></div>
                </div>
              </div>
              <!-- 链接嵌入 -->
              <div id="wk-video-embed-section" style="display:none;">
                <input type="text" id="wk-video-embed" placeholder="输入 Bilibili 或 YouTube 链接，如 https://www.bilibili.com/video/BVxxxxx" oninput="previewVideoEmbed(this.value)">
                <div class="video-embed-preview" id="wk-video-embed-preview" style="display:none;"></div>
              </div>
              <div class="upload-url-row" style="margin-top:10px;">
                <input type="text" id="wk-video" placeholder="视频URL（上传后或嵌入后自动填入）">
                <button type="button" class="btn btn-sm btn-success" onclick="manualFillUrl('wk-video')">确认URL</button>
              </div>
            </div>
          </div>

          <button type="submit" class="btn">添加创作</button>
        </form>
        
        <div class="data-list">
          <h3>已有创作</h3>
          <div id="list-works"><div class="loading">加载中...</div></div>
        </div>
      </div>

      <!-- 媒体库 -->
      <div class="tab-content" id="tab-media">
        <h2>媒体库</h2>
        <div class="msg" id="msg-media"></div>
        <div class="media-stats" id="media-stats">
          <div class="media-stat">
            <span>文件总数：</span>
            <strong id="media-count">0</strong>
          </div>
        </div>
        <div class="media-grid" id="media-grid">
          <div class="loading">加载中...</div>
        </div>
      </div>
      
    </div>
  </div>

  <script>
    // Supabase 配置
    const ADMIN_PW = 'lionmio2024';
    
    // 检查登录状态
    if (sessionStorage.getItem('adminLoggedIn') === 'true') {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminPanel').classList.add('active');
      loadAll();
    }
    
    // 登录
    function doLogin() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === ADMIN_PW) {
        sessionStorage.setItem('adminLoggedIn', 'true');
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').classList.add('active');
        loadAll();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }
    
    // 回车登录
    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') doLogin();
    });
    
    // Tab 切换
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`.tab-btn[onclick="switchTab('${name}')"]`).classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
      if (name === 'media') {
        loadMediaLibrary();
      }
    }
    
    // 显示消息
    function showMsg(id, type, text) {
      const el = document.getElementById(id);
      el.className = 'msg ' + type;
      el.textContent = text;
      setTimeout(() => { el.className = 'msg'; }, 3000);
    }
    
    // HTML转义
    function h(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
    
    // 加载所有数据
    function loadAll() {
      loadTimeline();
      loadCommission();
      loadWorks();
      loadMediaLibrary();
    }
    
    // ========== 图片/视频上传到 Supabase Storage ==========
    
    async function uploadImage(file) {
      const fileName = `${Date.now()}-${file.name}`;
      const { data, error } = await window.sb.storage
        .from('media')
        .upload(fileName, file, { upsert: true });
      if (error) throw error;
      const { data: urlData } = window.sb.storage
        .from('media')
        .getPublicUrl(fileName);
      return urlData.publicUrl;
    }
    
    async function uploadVideo(file) {
      const fileName = `${Date.now()}-${file.name}`;
      const { data, error } = await window.sb.storage
        .from('media')
        .upload(fileName, file, { upsert: true });
      if (error) throw error;
      const { data: urlData } = window.sb.storage
        .from('media')
        .getPublicUrl(fileName);
      return urlData.publicUrl;
    }
    
    // 手动确认URL
    function manualFillUrl(inputId) {
      const val = document.getElementById(inputId).value.trim();
      if (val) {
        showMsg('msg-' + (inputId.startsWith('cm') ? 'commission' : 'works'), 'success', 'URL已确认填入');
      }
    }
    
    // ========== 约稿图片上传处理 ==========

    // ========== 视频嵌入链接转换 ==========
    
    function switchVideoSource(source) {
      const uploadSection = document.getElementById('wk-video-upload-section');
      const embedSection = document.getElementById('wk-video-embed-section');
      const tabs = document.querySelectorAll('.video-source-tab');
      
      tabs.forEach(tab => tab.classList.remove('active'));
      
      if (source === 'upload') {
        uploadSection.style.display = '';
        embedSection.style.display = 'none';
        tabs[0].classList.add('active');
      } else {
        uploadSection.style.display = 'none';
        embedSection.style.display = '';
        tabs[1].classList.add('active');
      }
    }
    
    function previewVideoEmbed(url) {
      const preview = document.getElementById('wk-video-embed-preview');
      const embedUrl = convertToEmbedUrl(url);
      
      if (embedUrl) {
        preview.style.display = '';
        preview.innerHTML = `<strong>嵌入预览：</strong>将转换为以下iframe<br>
        <code style="word-break:break-all;font-size:11px;">${h(embedUrl)}</code>
        <br><br>
        <button type="button" class="btn btn-sm btn-success" onclick="applyVideoEmbed()">应用此嵌入</button>`;
        preview.dataset.embedUrl = embedUrl;
      } else if (url.trim()) {
        preview.style.display = '';
        preview.innerHTML = `<span style="color:#d93025;">无法识别此链接格式，请输入 Bilibili 或 YouTube 链接</span>`;
        preview.dataset.embedUrl = '';
      } else {
        preview.style.display = 'none';
        preview.dataset.embedUrl = '';
      }
    }
    
    function applyVideoEmbed() {
      const preview = document.getElementById('wk-video-embed-preview');
      const embedUrl = preview.dataset.embedUrl;
      if (embedUrl) {
        document.getElementById('wk-video').value = embedUrl;
        showMsg('msg-works', 'success', '嵌入链接已应用！');
      }
    }
    
    function convertToEmbedUrl(url) {
      if (!url) return null;
      url = url.trim();
      
      // Bilibili
      const bilibiliMatch = url.match(/bilibili\.com\/video\/([A-Za-z0-9]+)/i) || 
                           url.match(/b23\.tv\/([A-Za-z0-9]+)/i);
      if (bilibiliMatch) {
        return `//player.bilibili.com/player.html?bvid=${bilibiliMatch[1]}`;
      }
      
      // YouTube
      const youtubeMatch = url.match(/youtube\.com\/watch\?v=([A-Za-z0-9_-]+)/i) ||
                          url.match(/youtu\.be\/([A-Za-z0-9_-]+)/i);
      if (youtubeMatch) {
        return `https://www.youtube.com/embed/${youtubeMatch[1]}`;
      }
      
      return null;
    }

    // ========== 媒体库 ==========
    
    async function loadMediaLibrary() {
      const el = document.getElementById('media-grid');
      el.innerHTML = '<div class="loading">加载中...</div>';
      
      try {
        const { data, error } = await window.sb.storage
          .from('media')
          .list('', { limit: 100, sortBy: { column: 'created_at', order: 'desc' } });
        
        if (error) throw error;
        
        document.getElementById('media-count').textContent = data ? data.length : 0;
        
        if (!data || data.length === 0) {
          el.innerHTML = '<p class="empty">暂无上传的文件</p>';
          return;
        }
        
        // 过滤掉文件夹
        const files = data.filter(f => f.id && f.name);
        
        if (files.length === 0) {
          el.innerHTML = '<p class="empty">暂无上传的文件</p>';
          return;
        }
        
        el.innerHTML = files.map(file => {
          const isImage = /\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(file.name) || 
                         file.metadata?.mimetype?.startsWith('image/');
          const isVideo = file.metadata?.mimetype?.startsWith('video/');
          const size = formatFileSize(file.metadata?.size || 0);
          const url = getMediaPublicUrl(file.name);
          
          if (isImage) {
            return `
              <div class="media-item" data-file="${h(file.name)}">
                <img src="${h(url)}" class="media-thumb" alt="${h(file.name)}" loading="lazy" onclick="copyMediaUrl('${h(url.replace(/'/g, "\\'"))}')" style="cursor:pointer;" title="点击复制链接">
                <div class="media-info">
                  <div class="media-name" title="${h(file.name)}">${h(file.name)}</div>
                  <div class="media-size">${size}</div>
                </div>
                <div class="media-actions">
                  <button class="btn btn-sm" onclick="copyMediaUrl('${h(url.replace(/'/g, "\\'"))}')">复制链接</button>
                  <button class="btn btn-danger btn-sm" onclick="deleteMediaFile('${h(file.name)}')">删除</button>
                </div>
              </div>
            `;
          } else if (isVideo) {
            return `
              <div class="media-item" data-file="${h(file.name)}">
                <div class="media-thumb video-thumb">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                  </svg>
                  <span>视频文件</span>
                </div>
                <div class="media-info">
                  <div class="media-name" title="${h(file.name)}">${h(file.name)}</div>
                  <div class="media-size">${size}</div>
                </div>
                <div class="media-actions">
                  <button class="btn btn-sm" onclick="copyMediaUrl('${h(url.replace(/'/g, "\\'"))}')">复制链接</button>
                  <button class="btn btn-danger btn-sm" onclick="deleteMediaFile('${h(file.name)}')">删除</button>
                </div>
              </div>
            `;
          } else {
            return `
              <div class="media-item" data-file="${h(file.name)}">
                <div class="media-thumb video-thumb">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1">
                    <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                    <polyline points="13 2 13 9 20 9"/>
                  </svg>
                  <span>文件</span>
                </div>
                <div class="media-info">
                  <div class="media-name" title="${h(file.name)}">${h(file.name)}</div>
                  <div class="media-size">${size}</div>
                </div>
                <div class="media-actions">
                  <button class="btn btn-sm" onclick="copyMediaUrl('${h(url.replace(/'/g, "\\'"))}')">复制链接</button>
                  <button class="btn btn-danger btn-sm" onclick="deleteMediaFile('${h(file.name)}')">删除</button>
                </div>
              </div>
            `;
          }
        }).join('');
        
      } catch (error) {
        el.innerHTML = '<p class="empty">加载失败: ' + h(error.message) + '</p>';
      }
    }
    
    function getMediaPublicUrl(fileName) {
      const { data } = window.sb.storage.from('media').getPublicUrl(fileName);
      return data.publicUrl;
    }
    
    function formatFileSize(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }
    
    function copyMediaUrl(url) {
      navigator.clipboard.writeText(url).then(() => {
        showMsg('msg-media', 'success', '链接已复制到剪贴板！');
      }).catch(() => {
        // fallback
        const input = document.createElement('input');
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        showMsg('msg-media', 'success', '链接已复制到剪贴板！');
      });
    }
    
    async function deleteMediaFile(fileName) {
      if (!confirm('确定要删除文件 "' + fileName + '" 吗？')) return;
      
      try {
        const { error } = await window.sb.storage
          .from('media')
          .remove([fileName]);
        
        if (error) throw error;
        
        showMsg('msg-media', 'success', '文件已删除！');
        loadMediaLibrary();
      } catch (error) {
        showMsg('msg-media', 'error', '删除失败: ' + error.message);
      }
    }
