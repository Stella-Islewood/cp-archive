  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- 主题样式 -->
  <link rel="stylesheet" href="styles/theme-lionmio.css">
  <link rel="stylesheet" href="styles/theme-lucasmia.css">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/fortune.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header glass" role="banner">
    <div class="header-container">
      <div class="header-logo">
        <div class="logo-badge site-name-toggle" title="点击切换站点主题" role="button" tabindex="0" aria-label="切换站点主题">
          <span class="logo-initials">LM</span>
        </div>
        <span class="logo-text site-name-toggle" title="点击切换站点主题">
          <span class="site-name">LionMio</span>
        </span>
      </div>

      <!-- 桌面端导航 -->
      <nav class="desktop-nav" role="navigation" aria-label="主导航">
        <a href="index.html" class="nav-link">首页</a>
        <a href="archive.html" class="nav-link">档案</a>
        <a href="timeline.html" class="nav-link">时间线</a>
        <a href="commission.html" class="nav-link">约稿</a>
        <a href="works.html" class="nav-link">创作</a>
        <a href="guestbook.html" class="nav-link">留言板</a>
        <a href="suggestion.html" class="nav-link">建议箱</a>
        <a href="fortune.html" class="nav-link active">运势</a>
      </nav>

      <!-- 手机端汉堡按钮 -->
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="菜单">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- 手机端全屏菜单 -->
      <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">首页</a>
        <a href="archive.html">档案</a>
        <a href="timeline.html">时间线</a>
        <a href="commission.html">约稿</a>
        <a href="works.html">创作</a>
        <a href="guestbook.html">留言板</a>
        <a href="suggestion.html">建议箱</a>
        <a href="fortune.html">运势</a>
      </div>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="main-content fortune-page">
    <div class="container">
      
      <!-- 页面标题 -->
      <section class="page-header">
        <h1 class="page-title">今日运势</h1>
        <p class="page-subtitle">命运的齿轮会转向何方？</p>
      </section>

      <!-- 抽签区域 -->
      <section class="fortune-section">

        <!-- 签筒 -->
        <div class="fortune-shaker-wrap" id="fortuneShakerWrap">
          <div class="fortune-tube">
            <!-- 顶部 -->
            <div class="fortune-tube-cap"></div>
            <!-- 签条容器 -->
            <div class="fortune-sticks-wrap" id="fortuneSticks">
              <div class="fortune-stick"></div>
              <div class="fortune-stick"></div>
              <div class="fortune-stick"></div>
              <div class="fortune-stick"></div>
              <div class="fortune-stick"></div>
              <div class="fortune-stick"></div>
              <div class="fortune-stick"></div>
              <div class="fortune-stick"></div>
              <div class="fortune-stick"></div>
              <div class="fortune-stick"></div>
              <div class="fortune-stick"></div>
              <div class="fortune-stick"></div>
            </div>
            <!-- 底部竹节线 -->
            <div class="fortune-tube-line"></div>
            <div class="fortune-tube-line"></div>
            <div class="fortune-tube-line"></div>
          </div>
        </div>

        <!-- 抽签按钮 -->
        <button class="btn-draw" id="drawBtn">摇 签</button>

        <!-- 已抽取提示 -->
        <p class="already-drawn" id="alreadyDrawn" style="display: none;">
          今日已抽取，明日再来
        </p>

        <!-- 签纸展示 -->
        <div class="fortune-result" id="fortuneResult">
          <div class="fortune-slip" id="fortunePaper">
            <!-- 今日之签标签 -->
            <span class="fortune-label">今日之签</span>
            <!-- 运势等级 -->
            <div class="fortune-level" id="fortuneRank"></div>
            <!-- 签文竖排 -->
            <div class="fortune-text" id="fortuneText"></div>
            <!-- 日期 -->
            <span class="fortune-date" id="fortuneDate"></span>
          </div>
        </div>

      </section>

      <!-- 签筒介绍 -->
      <section class="fortune-intro">
        <p>心诚则灵，愿你得到指引</p>
      </section>

    </div>
  </main>

  <!-- 回到顶部按钮 -->
  <button class="back-to-top" id="backToTop" aria-label="回到顶部">
    <span class="back-to-top-icon">↑</span>
  </button>

  <footer class="site-footer" role="contentinfo">

      </div>
    </div>
  </footer>

  <script src="js/petals.js"></script>
  <script src="js/music-player.js"></script>
  <script src="js/fortune.js"></script>
  <script src="js/mobile-nav.js"></script>
</body>
