  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- 主题样式 -->
  <link rel="stylesheet" href="styles/theme-lionmio.css">
  <link rel="stylesheet" href="styles/theme-lucasmia.css">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/fortune.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header glass" role="banner">
    <div class="header-container">
      <div class="header-logo">
        <div class="logo-badge site-name-toggle" title="点击切换站点主题" role="button" tabindex="0" aria-label="切换站点主题">
          <span class="logo-initials">LM</span>
        </div>
        <span class="logo-text site-name-toggle" title="点击切换站点主题">
          <span class="site-name">LionMio</span>
        </span>
      </div>

      <!-- 桌面端导航 -->
      <nav class="desktop-nav" role="navigation" aria-label="主导航">
        <a href="index.html" class="nav-link">首页</a>
        <a href="archive.html" class="nav-link">档案</a>
        <a href="timeline.html" class="nav-link">时间线</a>
        <a href="commission.html" class="nav-link">约稿</a>
        <a href="works.html" class="nav-link">创作</a>
        <a href="guestbook.html" class="nav-link">留言板</a>
        <a href="suggestion.html" class="nav-link">建议箱</a>
        <a href="fortune.html" class="nav-link active">运势</a>
      </nav>

      <!-- 手机端汉堡按钮 -->
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="菜单">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- 手机端全屏菜单 -->
      <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">首页</a>
        <a href="archive.html">档案</a>
        <a href="timeline.html">时间线</a>
        <a href="commission.html">约稿</a>
        <a href="works.html">创作</a>
        <a href="guestbook.html">留言板</a>
        <a href="suggestion.html">建议箱</a>
        <a href="fortune.html">运势</a>
      </div>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="main-content fortune-page">
    <div class="container">
      
      <!-- 页面标题 -->
      <section class="page-header">
        <h1 class="page-title">今日运势</h1>
        <p class="page-subtitle">命运的齿轮会转向何方？</p>
      </section>

      <!-- 抽签区域 -->
      <section class="fortune-section">
        
        <!-- 竹签筒 -->
        <div class="bamboo-container" id="bambooContainer">
          <div class="bamboo-shaker" id="bambooShaker">
            <div class="bamboo-tube tube-1"></div>
            <div class="bamboo-tube tube-2"></div>
            <div class="bamboo-tube tube-3"></div>
            <div class="bamboo-tube tube-4"></div>
            <div class="bamboo-tube tube-5"></div>
            <div class="bamboo-tube tube-6"></div>
            <div class="bamboo-tube tube-7"></div>
            <div class="bamboo-tube tube-8"></div>
            <div class="bamboo-tube tube-9"></div>
            <div class="bamboo-tube tube-10"></div>
            <div class="bamboo-tube tube-11"></div>
            <div class="bamboo-tube tube-12"></div>
            <div class="bamboo-tube tube-13"></div>
            <div class="bamboo-tube tube-14"></div>
            <div class="bamboo-tube tube-15"></div>
            <div class="bamboo-tube tube-16"></div>
            <div class="bamboo-tube tube-17"></div>
            <div class="bamboo-tube tube-18"></div>
            <div class="bamboo-tube tube-19"></div>
            <div class="bamboo-tube tube-20"></div>
          </div>
          <div class="bamboo-base"></div>
        </div>

        <!-- 抽签按钮 -->
        <button class="btn-draw" id="drawBtn">
          <span class="btn-icon">🎋</span>
          <span class="btn-text">摇一摇</span>
        </button>

        <!-- 已抽取提示 -->
        <p class="already-drawn" id="alreadyDrawn" style="display: none;">
          今日已提取，明日再来～
        </p>

        <!-- 签文展示 -->
        <div class="fortune-result" id="fortuneResult" style="display: none;">
          <div class="fortune-paper" id="fortunePaper">
            <div class="fortune-rank" id="fortuneRank"></div>
            <div class="fortune-divider"></div>
            <p class="fortune-text" id="fortuneText"></p>
            <div class="fortune-seal" id="fortuneSeal">运</div>
          </div>
        </div>

      </section>

      <!-- 签筒介绍 -->
      <section class="fortune-intro">
        <p>每支签都承载着命运的指引</p>
        <p>点击「摇一摇」，让命运为你做出选择</p>
      </section>

    </div>
  </main>

  <!-- 回到顶部按钮 -->
  <button class="back-to-top" id="backToTop" aria-label="回到顶部">
    <span class="back-to-top-icon">↑</span>
  </button>

  <!-- Footer -->
  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <div class="footer-content">
        <p class="footer-left">每一段故事都值得被记住</p>
        <p class="footer-right">© <span class="footer-site-name">LionMio</span> Archive</p>
      </div>
    </div>
  </footer>

  <!-- 脚本 -->
  <script src="js/cp-data.js"></script>
  <script src="js/theme-switcher.js"></script>
  <script src="js/petals.js"></script>
  <script src="js/music-player.js"></script>
  <script src="js/fortune.js"></script>
  <script src="js/mobile-nav.js"></script>
</body>
</html>
