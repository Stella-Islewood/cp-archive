<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CP同人档案馆 - 约稿展示">
  <meta name="theme-color" content="#7BA7C4">
  
  <title>约稿展示 | CP同人档案馆</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- 主题样式 -->
  <link rel="stylesheet" href="styles/theme-lionmio.css">
  <link rel="stylesheet" href="styles/theme-lucasmia.css">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/commission.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header glass" role="banner">
    <div class="header-container">
      <div class="header-logo">
        <div class="logo-badge site-name-toggle" title="点击切换站点主题" role="button" tabindex="0" aria-label="切换站点主题">
          <span class="logo-initials">LM</span>
        </div>
        <span class="logo-text site-name-toggle" title="点击切换站点主题">
          <span class="site-name">LionMio</span>
        </span>
      </div>

      <!-- 桌面端导航 -->
      <nav class="desktop-nav" role="navigation" aria-label="主导航">
        <a href="index.html" class="nav-link">首页</a>
        <a href="archive.html" class="nav-link">档案</a>
        <a href="timeline.html" class="nav-link">时间线</a>
        <a href="commission.html" class="nav-link active">约稿</a>
        <a href="works.html" class="nav-link">创作</a>
        <a href="guestbook.html" class="nav-link">留言板</a>
        <a href="suggestion.html" class="nav-link">建议箱</a>
        <a href="fortune.html" class="nav-link">运势</a>
      </nav>

      <!-- 手机端汉堡按钮 -->
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="菜单">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- 手机端全屏菜单 -->
      <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">首页</a>
        <a href="archive.html">档案</a>
        <a href="timeline.html">时间线</a>
        <a href="commission.html">约稿</a>
        <a href="works.html">创作</a>
        <a href="guestbook.html">留言板</a>
        <a href="suggestion.html">建议箱</a>
        <a href="fortune.html">运势</a>
      </div>

      <!-- 用户登录状态区域 -->
      <div class="header-auth-area" id="headerAuth"></div>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="main-content commission-page">
    <div class="container">
      
      <!-- ========== 列表视图 ========== -->
      <div class="commission-list-view" id="commissionListView">
        <!-- 页面标题 -->
        <section class="page-header">
          <h1 class="page-title">约稿展示</h1>
          <p class="page-subtitle">每一张都是独一无二的回忆</p>
        </section>

        <!-- 搜索框 -->
        <div class="search-container">
          <input type="text" class="search-input" id="commissionSearch" placeholder="搜索标题、画师名..." autocomplete="off">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>

        <!-- Masonry 瀑布流网格 -->
        <div class="commission-grid" id="commissionGrid">
          <!-- 由 JS 动态生成 -->
        </div>
      </div>

      <!-- ========== 详情视图 ========== -->
      <div class="commission-detail-view hidden" id="commissionDetailView">
        <!-- 返回按钮 -->
        <button class="btn-back" id="btnBack">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          <span>← 返回列表</span>
        </button>

        <!-- 约稿详情内容 -->
        <article class="commission-detail" id="commissionDetail">
          <!-- 约稿信息 -->
          <div class="detail-info">
            <h1 class="detail-title" id="detailTitle">约稿标题</h1>
            <div class="detail-meta">
              <span class="detail-artist" id="detailArtist">画师：-</span>
              <span class="detail-tag" id="detailTag">类型</span>
              <span class="detail-date" id="detailDate">-</span>
            </div>
          </div>

          <!-- 分隔线 -->
          <div class="detail-divider"></div>

          <!-- 封面图/媒体区 -->
          <div class="detail-cover">
            <div class="detail-cover-placeholder" id="detailCoverPlaceholder">
              <!-- 默认占位图 -->
            </div>
            <!-- 相册容器（多图时显示） -->
            <div class="gallery-container" id="galleryContainer" style="display:none;">
              <div class="gallery-main">
                <img id="galleryMainImg" src="" alt="">
                <button class="gallery-prev" aria-label="上一张">‹</button>
                <button class="gallery-next" aria-label="下一张">›</button>
                <span class="gallery-counter" id="galleryCounter">1 / 1</span>
              </div>
              <div class="gallery-thumbs" id="galleryThumbs">
                <!-- 动态生成缩略图 -->
              </div>
            </div>
          </div>

          <!-- 主体内容区域 -->
          <div class="detail-content" id="detailContent">
            <!-- 动态填充 -->
          </div>

          <!-- 分隔线 -->
          <div class="detail-divider"></div>

          <!-- 评论区 -->
          <div class="comments-section">
            <h3 class="comments-title">💬 留言 <span id="commentsCount">(0)</span></h3>

            <!-- 评论输入框 -->
            <form class="comments-form" id="commentsForm">
              <textarea class="comment-content input-field" placeholder="说点什么..." maxlength="200" required></textarea>
              <button type="submit" class="btn btn-submit-comment">发布留言</button>
            </form>

            <!-- 评论列表 -->
            <div class="comments-list" id="commentsList"></div>
          </div>
        </article>
      </div>
    </div>
  </main>

  <!-- 回到顶部按钮 -->
  <button class="back-to-top" id="backToTop" aria-label="回到顶部">
    <span class="back-to-top-icon">↑</span>
  </button>

  <!-- Footer -->
  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <div class="footer-content">
        <p class="footer-left">每一段故事都值得被记住</p>
        <p class="footer-right">© <span class="footer-site-name">LionMio</span> Archive</p>
      </div>
    </div>
  </footer>

  <!-- 脚本 -->
  <script src="js/cp-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/theme-switcher.js"></script>
  <script src="js/petals.js"></script>
  <script src="js/music-player.js"></script>
  <script src="js/commission.js"></script>
  <script src="js/mobile-nav.js"></script>
  <script src="js/user-auth.js"></script>
</body>
</html>
