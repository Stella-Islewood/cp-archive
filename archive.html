  <script>
    window.addEventListener('load', function() {
      window.archiveClient = supabase.createClient(
        'https://vbvfrmqwlyitarmnhmyw.supabase.co',
        'sb_publishable_SB0uqo25MSjOPA4fb8n-eg_bCBiXMzH'
      );
    });
  </script>
</head>
<body>

        <span class="logo-text site-name-toggle" title="点击切换站点主题">

      <!-- 桌面端导航 -->
      <nav class="desktop-nav" role="navigation" aria-label="主导航">

      <!-- 手机端汉堡按钮 -->
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="菜单">

        <span></span>
        <span></span>
      </button>

      <!-- 手机端全屏菜单 -->
      <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">首页</a>
        <a href="archive.html">档案</a>
        <a href="timeline.html">时间线</a>
        <a href="commission.html">约稿</a>
        <a href="works.html">创作</a>

      <!-- 用户登录状态区域 -->
      <div class="header-auth-area" id="headerAuth"></div>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="main-content archive-page">
    <div class="container">
      
      <!-- 页面标题 -->
      <section class="page-header">
        <h1 class="page-title">角色档案</h1>
        <p class="page-subtitle">每一段故事，都从这里开始</p>
      </section>

      <!-- 角色卡片区域（动态加载） -->
      <section class="archive-section" id="archiveSection">
        <div id="characterCardsContainer">
          <div class="loading-text">加载角色数据中...</div>
        </div>
      </section>

    </div>
  </main>

  <!-- 回到顶部按钮 -->
  <button class="back-to-top" id="backToTop" aria-label="回到顶部">
    <span class="back-to-top-icon">↑</span>
  </button>

  <!-- Lightbox 放大查看 -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" aria-label="关闭">×</button>
    <button class="lightbox-nav prev" id="lightboxPrev" aria-label="上一张">‹</button>
    <button class="lightbox-nav next" id="lightboxNext" aria-label="下一张">›</button>
    <img src="" alt="" id="lightboxImage">
  </div>

  <!-- Footer -->
  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <div class="footer-content">
        <p class="footer-left">每一段故事都值得被记住</p>
        <p class="footer-right">© <span class="footer-site-name">LionMio</span> Archive</p>
      </div>
    </div>
  </footer>

  <!-- 脚本 -->
  <script src="js/cp-data.js"></script>
  <script src="js/theme-switcher.js"></script>
  <script src="js/petals.js"></script>
  <script src="js/music-player.js"></script>
  <script src="js/archive.js"></script>
  <script src="js/mobile-nav.js"></script>
  <script src="js/user-auth.js"></script>
  <script>
    // 角色数据管理
    (function() {
      // 相册状态
      var charGalleryState = {
        images: [],
        currentIndex: 0
      };

      // HTML转义
      function h(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      // 获取性格标签数组
      function getCharacterTraits(traits) {
        if (!traits) return [];
        if (Array.isArray(traits)) return traits;
        try {
          return JSON.parse(traits);
        } catch (e) {
          return [];
        }
      }

      // 获取图片数组
      function getCharacterImages(char) {
        if (!char) return [];
        if (char.images) {
          if (Array.isArray(char.images)) return char.images;
          try {
            return JSON.parse(char.images);
          } catch (e) {
            return [];
          }
        }
        return [];
      }

      // 获取伴侣名称
      function getPartnerName(name) {
        var partners = {
          'lion': 'Mio',
          'mio': 'Lion',
          'lucas': 'Mia',
          'mia': 'Lucas'
        };
        return partners[name.toLowerCase()] || '另一方';
      }

      // 加载角色数据
      async function loadCharacters() {
        var container = document.getElementById('characterCardsContainer');
        var theme = localStorage.getItem('cp-archive-theme') || 'lionmio';

        container.innerHTML = '<div class="loading-text">加载角色数据中...</div>';

        try {
          // 等待 archiveClient 初始化
          if (!window.archiveClient) {
            await new Promise(function(resolve) {
              var checkInterval = setInterval(function() {
                if (window.archiveClient) {
                  clearInterval(checkInterval);
                  resolve();
                }
              }, 100);
              setTimeout(function() {
                clearInterval(checkInterval);
                resolve();
              }, 3000);
            });
          }

          var { data, error } = await window.archiveClient
            .from('characters')
            .select('*')
            .order('name', { ascending: true });

          if (error) throw error;

          if (!data || data.length === 0) {
            container.innerHTML = '<div class="empty-text" style="text-align:center;padding:40px;color:#999;">暂无角色数据</div>';
            return;
          }

          // 根据主题过滤角色
          var filteredChars = data.filter(function(char) {
            var charTheme = char.archive_id || 'lionmio';
            return charTheme === theme;
          });

          if (filteredChars.length === 0) {
            container.innerHTML = '<div class="empty-text" style="text-align:center;padding:40px;color:#999;">当前主题暂无角色数据</div>';
            return;
          }

          // 渲染角色卡片
          container.innerHTML = filteredChars.map(function(char) {
            var traits = getCharacterTraits(char.traits);
            var images = getCharacterImages(char);
            var partnerName = getPartnerName(char.name);
            var hasImages = images.length > 0;
            var hasAvatar = char.avatar_url && char.avatar_url.trim() !== '';

            // 构建图集HTML
            var galleryHtml = '';
            if (hasImages) {
              galleryHtml = '<div class="profile-gallery">' +
                '<h4 class="gallery-title">图集</h4>' +
                '<div class="gallery-grid">' +
                images.map(function(img, idx) {
                  return '<img src="' + h(img) + '" alt="' + h(char.name) + ' 图集 ' + (idx + 1) + '" class="gallery-image" data-index="' + idx + '" onclick="openCharLightbox(\'' + h(char.name) + '\', ' + idx + ')">';
                }).join('') +
                '</div>' +
                '</div>';
            }

            return '<article class="character-profile" data-character="' + h(char.name.toLowerCase()) + '" data-theme="' + h(char.archive_id || 'lionmio') + '">' +
              '<div class="profile-avatar-section">' +
              '<div class="profile-avatar" id="avatar-' + h(char.name.toLowerCase()) + '">' +
              (hasAvatar ?
                '<img src="' + h(char.avatar_url) + '" alt="' + h(char.name) + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' :
                '') +
              '<span class="profile-avatar-placeholder" ' + (hasAvatar ? 'style="display:none;"' : '') + '>' + h(char.name.charAt(0).toUpperCase()) + '</span>' +
              '</div>' +
              '<h3 class="profile-name">' + h(char.name) + '</h3>' +
              '<p class="profile-tagline">' + h(char.tagline || '') + '</p>' +
              '</div>' +
              '<div class="profile-info">' +
              '<div class="profile-info-row">' +
              '<div class="profile-info-item">' +
              '<span class="profile-info-label">生日</span>' +
              '<span class="profile-info-value">' + (char.birthday ? h(char.birthday) : '<span class="pending-text">待补充</span>') + '</span>' +
              '</div>' +
              '<div class="profile-info-item">' +
              '<span class="profile-info-label">身高</span>' +
              '<span class="profile-info-value">' + (char.height ? h(char.height) : '<span class="pending-text">待补充</span>') + '</span>' +
              '</div>' +
              '</div>' +
              '<div class="profile-divider"></div>' +
              '<div class="profile-traits">' +
              (traits.length > 0 ? traits.map(function(t) {
                return '<span class="profile-trait">' + h(t) + '</span>';
              }).join('') : '<span class="pending-text">待补充</span>') +
              '</div>' +
              '<div class="profile-divider"></div>' +
              '<div class="profile-section">' +
              '<span class="profile-section-title">个人简介</span>' +
              '<p class="profile-section-content">' + (char.description ? h(char.description) : '<span class="pending-text">待补充</span>') + '</p>' +
              '</div>' +
              '<div class="profile-section">' +
              '<span class="profile-section-title">经典台词</span>' +
              '<p class="profile-quote">' + (char.quote ? h(char.quote) : '<span class="pending-text">待补充</span>') + '</p>' +
              '</div>' +
              '<div class="profile-section">' +
              '<span class="profile-section-title">与 ' + h(partnerName) + ' 的关系</span>' +
              '<p class="profile-relationship">' + (char.relationship ? h(char.relationship) : '<span class="pending-text">待补充</span>') + '</p>' +
              '</div>' +
              '<div class="profile-divider"></div>' +
              galleryHtml +
              '</div>' +
              '</article>';
          }).join('');

        } catch (err) {
          console.error('加载角色失败:', err);
          container.innerHTML = '<div class="error-text" style="text-align:center;padding:40px;color:#d93025;">加载失败: ' + h(err.message) + '</div>';
        }
      }

      // 打开角色相册 Lightbox
      function openCharLightbox(charName, imageIndex) {
        var theme = localStorage.getItem('cp-archive-theme') || 'lionmio';

        // 找到当前角色的图片
        var profile = document.querySelector('.character-profile[data-character="' + charName.toLowerCase() + '"]');
        if (!profile) return;

        var images = [];
        profile.querySelectorAll('.gallery-image').forEach(function(img) {
          images.push(img.src);
        });

        if (images.length === 0) return;

        charGalleryState.images = images;
        charGalleryState.currentIndex = imageIndex || 0;

        updateCharLightboxImage();
        document.getElementById('lightbox').style.display = 'flex';
      }

      // 更新 Lightbox 图片
      function updateCharLightboxImage() {
        var img = document.getElementById('lightboxImage');
        img.src = charGalleryState.images[charGalleryState.currentIndex];

        // 更新导航按钮
        var prevBtn = document.getElementById('lightboxPrev');
        var nextBtn = document.getElementById('lightboxNext');

        if (charGalleryState.images.length <= 1) {
          prevBtn.style.display = 'none';
          nextBtn.style.display = 'none';
        } else {
          prevBtn.style.display = 'flex';
          nextBtn.style.display = 'flex';
        }
      }

      // Lightbox 导航
      function charLightboxNav(direction) {
        var len = charGalleryState.images.length;
        if (len <= 1) return;

        if (direction === 'prev') {
          charGalleryState.currentIndex = (charGalleryState.currentIndex - 1 + len) % len;
        } else {
          charGalleryState.currentIndex = (charGalleryState.currentIndex + 1) % len;
        }
        updateCharLightboxImage();
      }

      // 初始化
      function init() {
        // 绑定 Lightbox 事件
        document.getElementById('lightboxClose').addEventListener('click', function() {
          document.getElementById('lightbox').style.display = 'none';
        });

        document.getElementById('lightboxPrev').addEventListener('click', function() {
          charLightboxNav('prev');
        });

        document.getElementById('lightboxNext').addEventListener('click', function() {
          charLightboxNav('next');
        });

        // 点击背景关闭
        document.getElementById('lightbox').addEventListener('click', function(e) {
          if (e.target === this) {
            this.style.display = 'none';
          }
        });

        // 键盘导航
        document.addEventListener('keydown', function(e) {
          if (document.getElementById('lightbox').style.display === 'flex') {
            if (e.key === 'ArrowLeft') charLightboxNav('prev');
            if (e.key === 'ArrowRight') charLightboxNav('next');
            if (e.key === 'Escape') document.getElementById('lightbox').style.display = 'none';
          }
        });

        // 加载角色数据
        loadCharacters();

        // 监听主题切换
        window.addEventListener('themechange', function() {
          loadCharacters();
        });
      }

      // 页面加载完成后初始化
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
